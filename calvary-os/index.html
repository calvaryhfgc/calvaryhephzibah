<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calvary OS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFFFFF">
<link rel="stylesheet" href="shell.css">
</head>
<body>

<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo-block">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 16 16" fill="none"><rect x="6.5" y="1" width="3" height="14" rx="0.5" fill="white"/><rect x="1" y="5.5" width="14" height="3" rx="0.5" fill="white"/></svg>
      </div>
      <div>
        <div class="auth-logo-name">Calvary OS</div>
        <div class="auth-logo-church">Calvary Hephzibah Full Gospel Church</div>
      </div>
    </div>

    <div class="auth-step active" id="step-who">
      <div class="auth-h">Good to see you 👋</div>
      <div class="auth-sub">Select your name to get started.</div>
      <div class="user-grid" id="user-grid"></div>
    </div>

    <div class="auth-step" id="step-pin">
      <button class="pin-back" onclick="COS._goBack()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
        Back
      </button>
      <div class="pin-name" id="pin-user-name">Enter your PIN</div>
      <div class="pin-sub">4-digit PIN to continue</div>
      <div class="pin-dots">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad">
        <button class="pkey" onclick="COS.pk('1')">1</button>
        <button class="pkey" onclick="COS.pk('2')">2</button>
        <button class="pkey" onclick="COS.pk('3')">3</button>
        <button class="pkey" onclick="COS.pk('4')">4</button>
        <button class="pkey" onclick="COS.pk('5')">5</button>
        <button class="pkey" onclick="COS.pk('6')">6</button>
        <button class="pkey" onclick="COS.pk('7')">7</button>
        <button class="pkey" onclick="COS.pk('8')">8</button>
        <button class="pkey" onclick="COS.pk('9')">9</button>
        <button class="pkey" style="visibility:hidden"></button>
        <button class="pkey" onclick="COS.pk('0')">0</button>
        <button class="pkey del" onclick="COS.pdel()">⌫</button>
      </div>
      <div class="pin-msg" id="pin-msg"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="shell.js"></script>
<script>
const _orig = COS._launchApp.bind(COS);
COS._launchApp = function(){
  sessionStorage.setItem('cos_session', JSON.stringify(this.currentUser));
  window.location.href = 'sunday.html';
};
COS.init();
</script>
</body>
</html>
