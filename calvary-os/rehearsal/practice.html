// ── VARIANT GENERATION ORCHESTRATION ────────────────────────
//
// Turns a key-chip tap into seven rendered, encoded, uploaded,
// recorded variant files — one per stem. Sequential per stem
// (not parallel) because offline rendering + MP3 encoding both
// want a lot of CPU, and running them concurrently on mobile
// can OOM or thermally throttle worse than doing them in sequence.
//
// Flow per stem:
//   1. Ensure stem buffer is decoded (from Supabase, if not already)
//   2. shiftStemBuffer() — OfflineAudioContext + SoundTouch
//   3. audioBufferToMp3Blob() — lamejs at 128kbps
//   4. uploadVariantFile() — POST to rehearsal-studio bucket
//   5. INSERT into rs_stem_variants
//
// Progress is tracked in state.variantGeneration and re-rendered
// into the transpose card after each tick.

async function generateVariantForKey(semitones){
  if(state.variantGeneration){
    COS.toast('Already generating a variant — wait for it to finish');
    return;
  }
  if(!state.reference || !state.reference.id){
    COS.toast('No reference loaded — cannot generate variant');
    return;
  }

  // List of stems this reference actually has.
  const stemsToProcess = STEMS
    .filter(s => state.stems[s.key].exists)
    .map(s => s.key);

  if(stemsToProcess.length === 0){
    COS.toast('No stems available to shift');
    return;
  }

  // Clear any stale placeholder
  state._pendingSemitones = null;

  // Overall progress model for this phase-based pipeline:
  //   0–10%  : loading source buffers
  //   10–60% : shared-context rendering (all stems together)
  //   60–100%: per-stem encode + upload + DB insert (sequential)
  state.variantGeneration = {
    semitones: semitones,
    progress: 0,
    stemStatuses: {},
    currentStem: null,
    currentStemProgress: 0,
    startedAt: Date.now(),
    phase: 'loading'
  };
  stemsToProcess.forEach(k => { state.variantGeneration.stemStatuses[k] = 'queued'; });
  renderTransposeUI();

  const referenceId = state.reference.id;
  const userName = (COS.currentUser && COS.currentUser.name) || null;

  let completed = 0;
  let hadFailure = false;

  try {
    // ── Phase 1: make sure all source buffers are decoded in memory ──
    state.variantGeneration.phase = 'loading';
    stemsToProcess.forEach(k => { state.variantGeneration.stemStatuses[k] = 'loading'; });
    renderTransposeUI();

    await Promise.all(stemsToProcess.map(k => ensureStemLoaded(k)));

    const stemEntries = [];
    for(const stemKey of stemsToProcess){
      const buf = state.stems[stemKey].buffer;
      if(!buf){
        console.warn('Source buffer missing for', stemKey, '— skipping');
        state.variantGeneration.stemStatuses[stemKey] = 'failed';
        hadFailure = true;
        continue;
      }
      stemEntries.push({ stemKey, buffer: buf });
      state.variantGeneration.stemStatuses[stemKey] = 'rendering';
    }
    state.variantGeneration.progress = 0.1;
    renderTransposeUI();

    if(stemEntries.length === 0){
      throw new Error('No source buffers available to shift');
    }

    // ── Phase 2: shared-context render (all stems together, no drift) ──
    state.variantGeneration.phase = 'rendering';
    renderTransposeUI();

    const shifted = await shiftAllStemsSharedContext(
      stemEntries,
      semitones,
      (p) => {
        if(state.variantGeneration){
          // 10% → 60% during render
          state.variantGeneration.progress = 0.1 + p * 0.5;
          renderTransposeUI();
        }
      }
    );

    // Mark all rendered stems as ready to encode
    stemEntries.forEach(e => {
      if(state.variantGeneration){
        state.variantGeneration.stemStatuses[e.stemKey] = 'encoding';
      }
    });
    renderTransposeUI();

    // ── Phase 3: encode + upload + DB insert, per stem ──
    // Sequential, not parallel — avoids hammering Supabase and keeps
    // UI responsive between each stem.
    for(let i = 0; i < stemEntries.length; i++){
      const { stemKey } = stemEntries[i];
      const gen = state.variantGeneration;
      if(!gen) break;  // cancelled

      try {
        gen.currentStem = stemKey;
        gen.stemStatuses[stemKey] = 'encoding';
        renderTransposeUI();

        const shiftedBuffer = shifted.get(stemKey);
        if(!shiftedBuffer){
          throw new Error('No shifted buffer for ' + stemKey);
        }

        // 3a. Encode
        const mp3Blob = await audioBufferToMp3Blob(shiftedBuffer, 128);

        // 3b. Upload
        gen.stemStatuses[stemKey] = 'uploading';
        renderTransposeUI();
        const path = variantStoragePath(referenceId, stemKey, semitones);
        await uploadVariantFile(mp3Blob, path);

        // 3c. Record in DB
        const row = {
          reference_id: referenceId,
          stem_type: stemKey,
          semitones: semitones,
          audio_path: path,
          created_by: userName
        };
        await upsertVariantRow(row);

        // Reflect into available variants state
        const k = String(semitones);
        if(!state.availableVariants[k]) state.availableVariants[k] = {};
        state.availableVariants[k][stemKey] = path;

        gen.stemStatuses[stemKey] = 'done';
        completed++;
      } catch(err){
        console.error(`Variant gen failed for stem ${stemKey}:`, err);
        if(state.variantGeneration){
          state.variantGeneration.stemStatuses[stemKey] = 'failed';
        }
        hadFailure = true;
      }

      // Progress: 60% → 100% across Phase 3
      if(state.variantGeneration){
        const phase3Pct = (i + 1) / stemEntries.length;
        state.variantGeneration.progress = 0.6 + phase3Pct * 0.4;
        renderTransposeUI();
      }
    }
  } catch(err){
    console.error('Variant generation pipeline failed:', err);
    hadFailure = true;
    if(state.variantGeneration){
      // Mark any still-queued stems as failed
      Object.keys(state.variantGeneration.stemStatuses).forEach(k => {
        const s = state.variantGeneration.stemStatuses[k];
        if(s !== 'done') state.variantGeneration.stemStatuses[k] = 'failed';
      });
    }
  } finally {
    // Leave the progress panel visible for a moment so the user sees
    // the final state, then clear.
    setTimeout(() => {
      state.variantGeneration = null;
      renderTransposeUI();
    }, 3000);

    if(hadFailure){
      COS.toast(`Variant gen finished with issues (${completed}/${stemsToProcess.length} stems)`);
    } else if(completed > 0){
      COS.toast(`${completed} stems ready at ${semitones > 0 ? '+' : ''}${semitones} st — tap the key to switch`);
    }
  }
}

// Recompute overall progress (0..1) based on completed stems + in-flight
// stem progress. Rerenders the UI.
function updateOverallProgress(completedCount, totalCount){
  const gen = state.variantGeneration;
  if(!gen) return;
  const perStem = 1 / totalCount;
  gen.progress = (completedCount * perStem) + (gen.currentStemProgress || 0) * perStem;
  renderTransposeUI();
}

// INSERT or UPSERT a row into rs_stem_variants. We use direct fetch
// with Prefer: resolution=merge-duplicates so a retry overwrites the
// existing row instead of erroring on the composite-key conflict.
async function upsertVariantRow(row){
  const res = await fetch(`${_PV_SUPA_URL}/rest/v1/rs_stem_variants`, {
    method: 'POST',
    headers: {
      'apikey': _PV_SUPA_KEY,
      'Authorization': `Bearer ${_PV_SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify(row)
  });
  if(!res.ok){
    const body = await res.text().catch(() => '');
    throw new Error(`DB insert failed (${res.status}): ${body || res.statusText}`);
  }
}

// ── KEY SWAP ────────────────────────────────────────────────
//
// When the user taps a chip that has a ready variant (or the original
// key, semitones=0), swap the playing audio to that version. If they
// tap an un-generated key, setTranspose routes to generation instead.
//
// Flow:
//   1. Bump the swap generation counter (cancels any in-flight swap)
//   2. Pause playback, remember position and whether was playing
//   3. Point each stem.path at the new variant URL (or originalPath if 0)
//   4. Clear buffers and kick off parallel reload
//   5. Wait for at least vocals + the selected-part stem to load
//   6. If was playing, resume at same arrTime; else just leave paused
//
// Cancellation: each in-flight piece checks state.swapGeneration against
// its captured generation number and bails if stale.

async function swapToKey(semitones){
  if(semitones === state.transposeSemitones) return;  // nothing to do

  // Cancel any in-flight swap
  const myGen = ++state.swapGeneration;
  state.swapInProgress = true;

  const wasPlaying = state.playing;
  const resumeAt = state.arrTime;

  // Pause cleanly if playing. Keep arrTime intact so we can resume there.
  if(state.playing){
    pause();
  }

  // Flip the transpose pointer and persist early so the UI reflects
  // the new state even if load fails later.
  state.transposeSemitones = semitones;
  try {
    localStorage.setItem('pv_transpose_' + state.arrangement.id, String(semitones));
  } catch(e){}

  // Point each stem at the appropriate path (original or variant)
  const variantMap = semitones === 0 ? null : state.availableVariants[String(semitones)] || {};
  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(!stem.exists) return;
    // Discard existing buffer and source — they belong to the old key
    try { if(stem.source) stem.source.stop(); } catch(e){}
    stem.source = null;
    stem.buffer = null;
    stem.loaded = false;
    stem.loading = false;
    stem.failed = false;
    stem.progress = 0;
    // Swap the path. For key 0, revert to originalPath.
    if(semitones === 0){
      stem.path = stem.originalPath;
    } else if(variantMap && variantMap[s.key]){
      stem.path = variantMap[s.key];
    } else {
      // Variant missing for this stem — leave originalPath so playback
      // at least has audio (degraded — this stem won't be shifted).
      console.warn('Variant missing for stem', s.key, 'at', semitones, 'st — using original');
      stem.path = stem.originalPath;
    }
  });

  // Rerender so stem mixer rows show their new loading state
  renderStems();
  renderTransposeUI();

  // Kick off parallel reload
  startParallelStemLoading();

  // Wait for ALL stems to be loaded before resuming playback. Staggered
  // arrival (where vocals start playing but drums arrive 3s later)
  // sounded jarring and broke the "tightness" of the mix. Better UX to
  // wait the extra few seconds and have a clean start.
  const allStems = STEMS
    .map(s => state.stems[s.key])
    .filter(s => s && s.exists);

  // Poll until all stems are loaded (or failed, or swap was cancelled)
  const waitForAll = () => new Promise(resolve => {
    const check = () => {
      // Stale check — a newer swap has taken over
      if(state.swapGeneration !== myGen) { resolve(false); return; }
      const allLoaded = allStems.every(s => s.loaded);
      const allSettled = allStems.every(s => s.loaded || s.failed);
      if(allLoaded) { resolve(true); return; }
      if(allSettled) { resolve(false); return; }  // some failed, partial playback
      setTimeout(check, 100);
    };
    check();
  });
  const allReady = await waitForAll();

  // Stale-check one more time before resuming playback
  if(state.swapGeneration !== myGen) return;

  state.swapInProgress = false;
  renderTransposeUI();

  if(wasPlaying && allReady){
    // Resume playback at the same position
    state.arrTime = resumeAt;
    await play();
  } else if(wasPlaying && !allReady){
    COS.toast('Some stems failed to load — playback paused');
  }
}

async function setTranspose(semitones){
  const n = Math.max(-7, Math.min(7, Math.round(parseFloat(semitones) || 0)));
  if(n === state.transposeSemitones) return;

  // If target variant isn't ready, kick off generation
  if(n !== 0 && variantStatus(n) !== 'ready'){
    return generateVariantForKey(n);
  }

  // Target is ready (either original or generated variant) — swap playback
  return swapToKey(n);
}

// Feature flag: the in-app pitch-shift generation produced audio that
// wasn't quite rehearsal-tight (SoundTouch WSOLA has inherent limits
// on percussive content). Hiding the UI until we can pipe in better-
// quality variants from Moises or a server-side pipeline.
// Flip TRANSPOSE_UI_ENABLED to true to re-expose. All backend
// infrastructure (generation, storage, swap) is intact underneath.
const TRANSPOSE_UI_ENABLED = false;

// Render the transpose card. Shows one chip per semitone in range, with
// state indicators (green dot = ready, amber pulse = generating, nothing
// = not yet generated, tap to generate).
function renderTransposeUI(){
  const container = document.getElementById('pv-transpose');
  if(!container) return;

  // Feature-flag off — keep the card hidden and skip rendering.
  // All state-update call sites still run safely (this just no-ops).
  if(!TRANSPOSE_UI_ENABLED){
    container.style.display = 'none';
    return;
  }

  const originalKey = state.arrangement ? state.arrangement.key : null;

  // If the arrangement has no key set, there's nothing meaningful to
  // transpose against — hide the card entirely. Admins can set the key
  // on the arrangement builder if they want to enable transpose.
  if(!originalKey){
    container.style.display = 'none';
    return;
  }
  container.style.display = '';

  const st = state.transposeSemitones;
  const targetKey = transposeKey(originalKey, st);
  const stLabel = st > 0 ? `+${st}` : String(st);

  // Generation progress panel (if currently generating)
  const gen = state.variantGeneration;
  let progressHTML = '';
  if(gen){
    const pct = Math.round((gen.progress || 0) * 100);
    const targetK = transposeKey(originalKey, gen.semitones);
    const elapsedMs = Date.now() - (gen.startedAt || Date.now());
    const elapsedSec = Math.round(elapsedMs / 1000);
    // Rough ETA: if progress > 2%, extrapolate total from elapsed and subtract
    let etaLabel = '';
    if(gen.progress && gen.progress > 0.02){
      const totalSec = elapsedMs / 1000 / gen.progress;
      const remainingSec = Math.max(0, Math.round(totalSec - elapsedSec));
      const mins = Math.floor(remainingSec / 60);
      const secs = remainingSec % 60;
      etaLabel = remainingSec > 60 ? ` · ~${mins}m ${secs}s remaining` : ` · ~${secs}s remaining`;
    }
    // Per-stem status as compact list. Icons reflect phase.
    const icons = { queued: '·', loading: '⇣', rendering: '⚙', encoding: '⏳', uploading: '☁', done: '✓', failed: '⚠' };
    const stemList = Object.entries(gen.stemStatuses || {})
      .map(([k, v]) => `<span class="pv-tx-stem-pill pv-tx-stem-${escapeHtml(v)}">${icons[v] || '·'} ${escapeHtml(k)}</span>`)
      .join('');
    progressHTML = `
      <div class="pv-tx-progress">
        <div class="pv-tx-progress-label">Generating ${escapeHtml(targetK || '')} version… ${pct}%${etaLabel}</div>
        <div class="pv-tx-progress-bar"><div class="pv-tx-progress-fill" style="width:${pct}%"></div></div>
        <div class="pv-tx-progress-detail">${stemList}</div>
      </div>`;
  }

  // Build chips — one per semitone, with state-based classes
  const chips = [];
  for(let s = -7; s <= 7; s++){
    const k = transposeKey(originalKey, s);
    if(!k) continue;
    const status = variantStatus(s);
    const classes = ['pv-tx-chip'];
    if(Math.round(s) === Math.round(st)) classes.push('active');
    if(status === 'ready' && s !== 0) classes.push('ready');
    if(gen && gen.semitones === s) classes.push('generating');
    const disabled = (gen || state.swapInProgress) ? 'disabled' : '';
    const title = s === 0
      ? 'Original key'
      : status === 'ready'
        ? `${s > 0 ? '+' : ''}${s} semitones (ready)`
        : `${s > 0 ? '+' : ''}${s} semitones (tap to generate)`;
    chips.push(`
      <button class="${classes.join(' ')}" onclick="setTranspose(${s})" ${disabled} title="${escapeHtml(title)}">
        ${escapeHtml(k)}
      </button>`);
  }

  container.innerHTML = `
    <div class="pv-transpose-head">
      <div>
        <div class="pv-transpose-label">Transpose</div>
        <div class="pv-transpose-value">
          ${originalKey ? `<span class="pv-tx-orig">${escapeHtml(originalKey)}</span>` : ''}
          ${originalKey && targetKey ? `<span class="pv-tx-arrow">→</span>` : ''}
          ${targetKey ? `<span class="pv-tx-target">${escapeHtml(targetKey)}</span>` : ''}
          <span class="pv-tx-st">(${stLabel} st)</span>
        </div>
      </div>
      <button class="pv-tx-reset" onclick="setTranspose(0)" ${st === 0 || gen || state.swapInProgress ? 'disabled' : ''}>Reset</button>
    </div>
    <div class="pv-tx-chips">${chips.join('')}</div>
    ${state.swapInProgress ? `
      <div class="pv-tx-pending">
        <span class="pv-tx-spinner"></span> Switching to ${escapeHtml(targetKey || '')} — reloading stems…
      </div>` : ''}
    <div class="pv-tx-hint">
      Tap a key to switch. Green dot means variants are ready — switch is instant. No dot means tap to generate first (~50s per key).
    </div>
    ${progressHTML}
  `;
}

// Load a single stem: fetch with progress streaming, decode, cache in memory.
// Retries once on failure with a 1s delay. Updates state.stems[].progress (0-1)
// as bytes stream in, and fires recalcLoadProgress() after each state change
// so the header progress bar and play button stay in sync.
async function ensureStemLoaded(stemKey, {isRetry = false} = {}){
  const stem = state.stems[stemKey];
  if(!stem || !stem.exists) return null;
  if(stem.loaded) return stem.buffer;
  if(stem.loading) {
    // Already in progress elsewhere — return a promise that resolves when it completes
    return new Promise((resolve) => {
      const check = () => {
        if(stem.loaded) resolve(stem.buffer);
        else if(!stem.loading) resolve(null);
        else setTimeout(check, 100);
      };
      check();
    });
  }
  if(stem.failed && !isRetry) return null;

  stem.loading = true;
  stem.failed = false;
  stem.progress = 0;
  renderStemLoadingUI(stemKey);
  recalcLoadProgress();

  try {
    const ctx = ensureAudioContext();
    const url = publicUrl(stem.path);
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);

    // Stream the response to track progress. If content-length is missing
    // (some CDNs), we fall back to indeterminate progress.
    const contentLength = parseInt(res.headers.get('content-length') || '0', 10);
    let arrayBuffer;

    if(contentLength > 0 && res.body && res.body.getReader){
      const reader = res.body.getReader();
      const chunks = [];
      let received = 0;
      while(true){
        const { done, value } = await reader.read();
        if(done) break;
        chunks.push(value);
        received += value.length;
        stem.progress = Math.min(1, received / contentLength);
        recalcLoadProgress();  // updates header bar in real time
      }
      // Concatenate chunks into one ArrayBuffer
      const buf = new Uint8Array(received);
      let offset = 0;
      for(const chunk of chunks){
        buf.set(chunk, offset);
        offset += chunk.length;
      }
      arrayBuffer = buf.buffer;
    } else {
      arrayBuffer = await res.arrayBuffer();
      stem.progress = 0.9;  // show almost-done; decode is still pending
      recalcLoadProgress();
    }

    // Decode is async and can take 500ms+ for a 6MB MP3
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
    stem.buffer = audioBuffer;
    stem.loaded = true;
    stem.progress = 1;

    // Create a GainNode for this stem (persists across plays)
    if(!stem.gain){
      stem.gain = ctx.createGain();
      stem.gain.connect(ctx.destination);
      stem.gain.gain.value = effectiveGain(stemKey);
    }
  } catch(err){
    console.error('Failed to load stem ' + stemKey + ':', err);
    stem.loading = false;
    stem.progress = 0;
    if(!isRetry){
      // Retry once after a short delay
      renderStemLoadingUI(stemKey);
      recalcLoadProgress();
      await new Promise(r => setTimeout(r, 1000));
      return ensureStemLoaded(stemKey, {isRetry: true});
    }
    stem.failed = true;
    renderStemLoadingUI(stemKey);
    recalcLoadProgress();
    return null;
  }

  stem.loading = false;
  renderStemLoadingUI(stemKey);
  recalcLoadProgress();
  return stem.buffer;
}

// Update just the loading indicator for one stem row.
function renderStemLoadingUI(stemKey){
  const stem = state.stems[stemKey];
  const row = document.getElementById('stem-row-' + stemKey);
  if(!row) return;
  const slider = row.querySelector('.pv-stem-slider');
  const existing = document.getElementById('stem-loader-' + stemKey);
  if(existing) existing.remove();

  if(stem.loading){
    if(slider) slider.style.opacity = '0.5';
    const loader = document.createElement('div');
    loader.className = 'pv-stem-loading';
    loader.id = 'stem-loader-' + stemKey;
    const head = row.querySelector('.pv-stem-head');
    const btns = row.querySelector('.pv-stem-btns');
    if(head && btns){
      head.insertBefore(loader, btns);
    } else if(head){
      head.appendChild(loader);
    }
  } else if(stem.failed){
    if(slider) slider.style.opacity = '0.4';
    const warn = document.createElement('div');
    warn.className = 'pv-stem-failed';
    warn.id = 'stem-loader-' + stemKey;
    warn.textContent = '⚠';
    warn.title = 'Failed to load — tap to retry';
    warn.style.cssText = 'color:#FBBF24;font-size:16px;cursor:pointer;padding:6px;';
    warn.onclick = () => ensureStemLoaded(stemKey);
    const head = row.querySelector('.pv-stem-head');
    const btns = row.querySelector('.pv-stem-btns');
    if(head && btns){
      head.insertBefore(warn, btns);
    } else if(head){
      head.appendChild(warn);
    }
  } else if(stem.loaded){
    if(slider) slider.style.opacity = '';
  }
}

// Recalculate overall load progress and update the header bar + play button.
// Called after every stem state change.
function recalcLoadProgress(){
  const existingStems = STEMS.filter(s => state.stems[s.key].exists);
  if(existingStems.length === 0) return;

  // Priority stems: selected part + vocals (drive play-readiness)
  const partStemKey = PARTS.find(p => p.key === state.currentPart)?.stem;
  const priorityKeys = [partStemKey, 'vocals'].filter(Boolean);
  const priorityStems = priorityKeys
    .map(k => state.stems[k])
    .filter(s => s && s.exists);

  // Overall progress (all stems, average of their progress values)
  const total = existingStems.reduce((sum, s) => sum + (state.stems[s.key].progress || 0), 0);
  const avgPct = total / existingStems.length;

  // Priority progress (separate calc for the header bar)
  const priorityTotal = priorityStems.reduce((sum, s) => sum + (s.progress || 0), 0);
  const priorityPct = priorityStems.length ? (priorityTotal / priorityStems.length) : 1;

  // Play-ready when every priority stem is fully loaded
  const playReady = priorityStems.length > 0 && priorityStems.every(s => s.loaded);
  updatePlayButtonState(playReady);

  // Header load bar
  updateHeaderLoadBar(priorityPct, avgPct, playReady);
}

// Update play button: spinner if not ready, ▶/❚❚ otherwise.
function updatePlayButtonState(playReady){
  const btn = document.getElementById('pv-play');
  if(!btn) return;
  if(state.playing){
    btn.disabled = false;
    btn.innerHTML = '❚❚';
    btn.classList.remove('pv-play-loading');
    return;
  }
  if(playReady){
    btn.disabled = false;
    btn.innerHTML = '▶';
    btn.classList.remove('pv-play-loading');
  } else if(state.slots.length === 0){
    btn.disabled = true;
    btn.innerHTML = '▶';
    btn.classList.remove('pv-play-loading');
  } else {
    btn.disabled = true;
    btn.innerHTML = '<span class="pv-play-spin"></span>';
    btn.classList.add('pv-play-loading');
  }
}

// Update the load-progress bar in the header.
function updateHeaderLoadBar(priorityPct, overallPct, playReady){
  const bar = document.getElementById('pv-load-bar');
  const fill = document.getElementById('pv-load-fill');
  const text = document.getElementById('pv-load-text');
  if(!bar || !fill || !text) return;

  if(overallPct >= 0.999){
    // All stems loaded — fade out the bar
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  fill.style.width = Math.round(overallPct * 100) + '%';
  if(!playReady){
    text.textContent = 'Loading your part… ' + Math.round(priorityPct * 100) + '%';
  } else {
    const others = Math.round(overallPct * 100);
    text.textContent = 'Ready ✓  ·  other stems ' + others + '%';
  }
}

// Called once after arrangement data is loaded. Kicks off all stem
// downloads in parallel — priority stems started first in the same tick
// so they tend to get the earliest network slots, others follow.
function startParallelStemLoading(){
  const partStemKey = PARTS.find(p => p.key === state.currentPart)?.stem;
  const priorityKeys = [partStemKey, 'vocals'].filter(Boolean);
  const priority = new Set(priorityKeys);

  const priorityStems = [];
  const secondary = [];
  STEMS.forEach(s => {
    if(!state.stems[s.key].exists) return;
    if(priority.has(s.key)) priorityStems.push(s.key);
    else secondary.push(s.key);
  });

  // Kick off priority first (they get to the fetch queue first)
  priorityStems.forEach(k => ensureStemLoaded(k));
  // Secondary stems: tiny stagger so the browser's HTTP2/fetch prioritisation
  // has already settled on the priority requests before these pile in.
  setTimeout(() => {
    secondary.forEach(k => ensureStemLoaded(k));
  }, 50);

  // Initial progress recalc so the UI shows the loading state right away
  recalcLoadProgress();
}

// Convert arrangement time (0..totalDuration) to reference time (seconds in the MP3)
function arrangementToReferenceTime(arrT){
  let remaining = arrT;
  for(const slot of state.slots){
    const slotDur = slot.chop.end_seconds - slot.chop.start_seconds;
    if(remaining <= slotDur){
      return { refTime: slot.chop.start_seconds + remaining, slot: slot, slotOffset: remaining };
    }
    remaining -= slotDur;
  }
  // Past the end
  if(state.slots.length){
    const lastSlot = state.slots[state.slots.length - 1];
    return { refTime: lastSlot.chop.end_seconds, slot: lastSlot, slotOffset: lastSlot.chop.end_seconds - lastSlot.chop.start_seconds };
  }
  return { refTime: 0, slot: null, slotOffset: 0 };
}

// Compute which slot index the current arrTime falls into
function slotIndexAtArrTime(arrT){
  let cum = 0;
  for(let i = 0; i < state.slots.length; i++){
    const slotDur = state.slots[i].chop.end_seconds - state.slots[i].chop.start_seconds;
    if(arrT < cum + slotDur) return i;
    cum += slotDur;
  }
  return state.slots.length - 1;
}

// Arrangement time at the start of a slot
function slotStartArrTime(idx){
  let cum = 0;
  for(let i = 0; i < idx; i++){
    cum += state.slots[i].chop.end_seconds - state.slots[i].chop.start_seconds;
  }
  return cum;
}

// ── PLAYBACK ─────────────────────────────────────────────────
async function togglePlay(){
  if(state.playing){
    pause();
  } else {
    await play();
  }
}

async function play(){
  const ctx = ensureAudioContext();
  if(ctx.state === 'suspended') await ctx.resume();

  // Make sure at least the selected-part stem + vocals are loaded before starting
  const partStem = PARTS.find(p => p.key === state.currentPart)?.stem;
  const prerequisites = [partStem, 'vocals'].filter(Boolean);
  await Promise.all(prerequisites.map(s => ensureStemLoaded(s)));

  // If every loaded stem has zero effective gain (all muted/soloed out), warn
  const anyAudible = STEMS.some(s => state.stems[s.key].loaded && effectiveGain(s.key) > 0);
  if(!anyAudible){
    COS.toast('All stems are muted — adjust the mixer to hear playback');
  }

  startAllSources(state.arrTime);
  state.playing = true;
  document.getElementById('pv-play').textContent = '❚❚';
  tickPlayback();
}

function pause(){
  stopAllSources();
  state.playing = false;
  document.getElementById('pv-play').textContent = '▶';
  if(state.rafId){ cancelAnimationFrame(state.rafId); state.rafId = null; }
}

// Start all loaded stems playing in lock-step at the given arrangement time
function startAllSources(arrT){
  const ctx = ensureAudioContext();
  const { refTime } = arrangementToReferenceTime(arrT);
  const startAt = ctx.currentTime + 0.02;  // small lead so all sources align
  state.startedAt = startAt;
  state.startOffset = arrT;

  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(!stem.loaded) return;
    // Each play requires a fresh source node
    try { if(stem.source) stem.source.stop(); } catch(e){}
    stem.source = ctx.createBufferSource();
    stem.source.buffer = stem.buffer;
    stem.source.playbackRate.value = state.playbackRate;
    stem.source.connect(stem.gain);
    // Guard against refTime exceeding buffer length (shouldn't happen but safe)
    const offset = Math.min(refTime, stem.buffer.duration - 0.01);
    stem.source.start(startAt, Math.max(0, offset));
  });
}

function stopAllSources(){
  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(stem.source){
      try { stem.source.stop(); } catch(e){}
      stem.source = null;
    }
  });
}

// Main playback tick — runs via RAF while playing
function tickPlayback(){
  if(!state.playing) return;
  const ctx = state.audioCtx;
  if(!ctx){ return; }

  // Current arrangement time = startOffset + (audioTime - startedAt) * playbackRate
  const audioElapsed = Math.max(0, ctx.currentTime - state.startedAt);
  state.arrTime = state.startOffset + audioElapsed * state.playbackRate;

  // End of arrangement?
  if(state.arrTime >= state.totalDuration){
    // If looping a specific slot, bounce back to that slot's start
    if(state.loopSlotIdx >= 0){
      const slotStart = slotStartArrTime(state.loopSlotIdx);
      seek(slotStart);
      state.rafId = requestAnimationFrame(tickPlayback);
      return;
    }
    // Otherwise stop at end
    state.arrTime = state.totalDuration;
    pause();
    updateTimeUI();
    return;
  }

  // Slot-hop detection: did we cross from slot N to slot N+1?
  const slotIdx = slotIndexAtArrTime(state.arrTime);
  if(slotIdx !== state.currentSlotIdx){
    state.currentSlotIdx = slotIdx;
    updateCurrentSlotUI();
    // Handle slot-hop in audio: we need to seek reference audio to the new slot's start
    // Only seek if the slot transition is not "natural" (i.e. slot end doesn't align with next slot start in reference)
    const thisSlotArrStart = slotStartArrTime(slotIdx);
    const thisSlotRefStart = state.slots[slotIdx].chop.start_seconds;
    // Expected reference time based on contiguous playback from startOffset
    // If it differs by more than a tiny epsilon, we need to seek
    if(slotIdx > 0){
      const prevSlot = state.slots[slotIdx - 1];
      const prevSlotRefEnd = prevSlot.chop.end_seconds;
      if(Math.abs(thisSlotRefStart - prevSlotRefEnd) > 0.05){
        // Slots are not contiguous in reference time → seek
        seek(state.arrTime);
      }
    }
  }

  // Loop mode: if we're past the active loop slot's end, seek back
  if(state.loopSlotIdx >= 0 && slotIdx > state.loopSlotIdx){
    const slotStart = slotStartArrTime(state.loopSlotIdx);
    seek(slotStart);
    state.rafId = requestAnimationFrame(tickPlayback);
    return;
  }

  updateTimeUI();
  state.rafId = requestAnimationFrame(tickPlayback);
}

function updateTimeUI(){
  document.getElementById('pv-cur').textContent = fmtTime(state.arrTime);
  if(!state.scrubbing){
    document.getElementById('pv-scrub').value = state.arrTime;
  }
}

function updateCurrentSlotUI(){
  document.querySelectorAll('#pv-ribbon .pv-slot').forEach((el, i) => {
    el.classList.toggle('current', i === state.currentSlotIdx);
  });
  // Scroll the current slot into view
  const activeEl = document.querySelector('#pv-ribbon .pv-slot.current');
  if(activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── SEEK / SKIP / SCRUB ──────────────────────────────────────
function seek(arrT){
  state.arrTime = Math.max(0, Math.min(state.totalDuration, arrT));
  if(state.playing){
    stopAllSources();
    startAllSources(state.arrTime);
  }
  state.currentSlotIdx = slotIndexAtArrTime(state.arrTime);
  updateCurrentSlotUI();
  updateTimeUI();
}

function skipBy(delta){
  seek(state.arrTime + delta);
}

function onScrub(v){
  state.scrubbing = true;
  const arrT = parseFloat(v);
  document.getElementById('pv-cur').textContent = fmtTime(arrT);
  clearTimeout(state._scrubTimer);
  state._scrubTimer = setTimeout(() => {
    seek(arrT);
    state.scrubbing = false;
  }, 120);
}

function jumpToSlot(idx){
  const arrT = slotStartArrTime(idx);
  seek(arrT);
  if(!state.playing){ play(); }
}

function toggleLoopSlot(idx){
  if(state.loopSlotIdx === idx){
    state.loopSlotIdx = -1;
    COS.toast('Loop off');
  } else {
    state.loopSlotIdx = idx;
    document.getElementById('pv-loop-cb').checked = true;
    document.getElementById('pv-loop-toggle').classList.add('looping');
    COS.toast('Looping: ' + (state.slots[idx].chop.label || 'slot ' + (idx+1)));
    // Seek to the slot start
    jumpToSlot(idx);
    return;  // jumpToSlot already updates UI
  }
  document.getElementById('pv-loop-toggle').classList.toggle('looping', state.loopSlotIdx >= 0);
  renderRibbon();
}

function onLoopToggle(){
  const checked = document.getElementById('pv-loop-cb').checked;
  if(!checked){
    state.loopSlotIdx = -1;
    document.getElementById('pv-loop-toggle').classList.remove('looping');
    renderRibbon();
  } else if(state.loopSlotIdx < 0 && state.currentSlotIdx >= 0){
    // Toggle on → loop the current slot
    state.loopSlotIdx = state.currentSlotIdx;
    document.getElementById('pv-loop-toggle').classList.add('looping');
    renderRibbon();
    COS.toast('Looping: ' + (state.slots[state.currentSlotIdx].chop.label || 'slot'));
  }
}

// ── SPEED ────────────────────────────────────────────────────
function setSpeed(rate){
  state.playbackRate = rate;
  document.querySelectorAll('.pv-speed-chip').forEach(chip => {
    chip.classList.toggle('active', parseFloat(chip.getAttribute('data-speed')) === rate);
  });
  if(state.playing){
    // Re-anchor time reference, then apply rate to live sources
    const ctx = state.audioCtx;
    const audioElapsed = Math.max(0, ctx.currentTime - state.startedAt);
    state.startOffset = state.startOffset + audioElapsed * (state.playbackRate === rate ? 1 : rate);
    // Simpler: just restart from current arrTime with new rate
    seek(state.arrTime);
  }
  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(stem.source){
      try { stem.source.playbackRate.value = rate; } catch(e){}
    }
  });
}

// ── PRACTICE LOGGING ─────────────────────────────────────────
async function markPractised(){
  if(!COS.currentUser){ COS.toast('Not logged in'); return; }
  const row = {
    arrangement_id: state.arrangement.id,
    part: state.currentPart,
    duration_seconds: Math.round(state.totalDuration),
    user_name: COS.currentUser.name,
    completed_at: new Date().toISOString()
  };
  const res = await sbPost('rs_practice_sessions', row);
  if(res){
    const btn = document.getElementById('pv-practise-btn');
    btn.classList.add('done');
    btn.textContent = '✓ Logged';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.textContent = '✓ Mark as practised';
    }, 2500);
    loadPracticeCount();
  } else {
    COS.toast('Could not log practice — try again');
  }
}

async function loadPracticeCount(){
  if(!COS.currentUser) return;
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const userName = encodeURIComponent(COS.currentUser.name);
  const sessions = await sbFetch(`rs_practice_sessions?arrangement_id=eq.${state.arrangement.id}&user_name=eq.${userName}&completed_at=gte.${weekAgo}`);
  const count = (sessions || []).length;
  const el = document.getElementById('pv-practise-count');
  if(count === 0){
    el.textContent = '';
  } else {
    el.textContent = `You've practised this ${count} time${count===1?'':'s'} this week.`;
  }
}

// ── UTILS ────────────────────────────────────────────────────
function fmtTime(s){
  if(s === null || s === undefined || isNaN(s)) return '0:00';
  const n = Math.max(0, s);
  const m = Math.floor(n / 60);
  const r = Math.floor(n % 60);
  return `${m}:${r.toString().padStart(2,'0')}`;
}
function escapeHtml(s){
  return (s || '').toString()
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
