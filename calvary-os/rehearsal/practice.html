<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Calvary OS — Practice</title>
<meta name="theme-color" content="#0A0A0A">
<link rel="stylesheet" href="../shell.css">
<style>
  /* ── PRACTICE VIEW LOCAL STYLES ───────────────────────────────
     Dark theme, phone-first. Practice View is used by team members on
     their phones during the week while they rehearse. */

  body { background: #0A0A0A; }
  #app.visible { background: #0A0A0A; }

  /* The app shell chain (html/body/app/app-body/main) all have overflow:hidden
     to constrain the viewport. Practice View is a tall, scrollable page, so we
     make .pv-wrap itself the scroll container. It gets its height from the
     flex chain above, scrolls vertically internally, and lets .main's
     overflow:hidden clip any horizontal overflow from child scrollers. */
  .pv-wrap{max-width:720px;margin:0 auto;padding:20px 16px 40px;color:white;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;box-sizing:border-box;width:100%;}

  /* Header */
  .pv-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
  .pv-back{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;font-size:18px;}
  .pv-back:hover{background:rgba(255,255,255,0.1);}
  .pv-hdr-body{flex:1;min-width:0;}
  .pv-song-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);}
  .pv-arr-name{font-family:'Lora',serif;font-size:22px;font-weight:600;color:white;line-height:1.2;margin-top:2px;}
  .pv-meta{font-size:12px;color:rgba(255,255,255,0.55);margin-top:4px;font-variant-numeric:tabular-nums;}

  /* Horizontal-scrollers with a subtle fade on the right to hint there's more */
  .pv-scroll-mask{position:relative;}
  .pv-scroll-mask::after{content:'';position:absolute;top:0;right:0;bottom:0;width:24px;background:linear-gradient(to right, rgba(10,10,10,0), #0A0A0A);pointer-events:none;}

  /* Part selector */
  .pv-parts{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:2px 0 6px;margin-bottom:20px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;width:100%;max-width:100%;}
  .pv-parts::-webkit-scrollbar{display:none;}
  .pv-part{flex:0 0 auto;padding:11px 16px;min-height:44px;border-radius:100px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;white-space:nowrap;transition:all 0.15s;}
  .pv-part:hover{background:rgba(255,255,255,0.08);color:white;}
  .pv-part.active{background:var(--red);border-color:var(--red);color:white;}
  .pv-part-icon{font-size:16px;}

  /* Direction card */
  .pv-direction{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
  .pv-direction-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:6px;}
  .pv-direction-text{font-size:14px;line-height:1.55;color:rgba(255,255,255,0.85);white-space:pre-wrap;}
  .pv-direction-empty{font-size:13px;color:rgba(255,255,255,0.35);font-style:italic;}

  /* Section ribbon */
  .pv-ribbon{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;padding:4px 0 8px;margin-bottom:20px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;width:100%;max-width:100%;}
  .pv-ribbon::-webkit-scrollbar{display:none;}
  .pv-slot{flex:0 0 auto;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);min-width:84px;min-height:60px;cursor:pointer;transition:all 0.15s;text-align:center;}
  .pv-slot:hover{background:rgba(255,255,255,0.1);}
  .pv-slot.current{background:rgba(196,30,42,0.25);border-color:var(--red);}
  .pv-slot.looping{background:rgba(251,191,36,0.2);border-color:#FBBF24;}
  .pv-slot-label{font-size:13px;font-weight:600;color:white;white-space:nowrap;}
  .pv-slot-num{font-size:10px;color:rgba(255,255,255,0.45);font-weight:700;letter-spacing:0.5px;margin-bottom:3px;}
  .pv-slot-dur{font-size:11px;color:rgba(255,255,255,0.55);margin-top:3px;font-variant-numeric:tabular-nums;}
  .pv-ribbon-empty{padding:24px 16px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.12);border-radius:14px;text-align:center;color:rgba(255,255,255,0.55);font-size:13px;line-height:1.5;}
  .pv-ribbon-empty a{color:var(--red);font-weight:600;text-decoration:none;}

  /* Transport */
  .pv-transport{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin-bottom:16px;}
  /* Top row: play in the centre with skip buttons flanking it. Time on its own below. */
  .pv-transport-top{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:10px;}
  .pv-play{width:60px;height:60px;border-radius:50%;border:none;background:var(--red);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.1s;}
  .pv-play:hover:not(:disabled){background:var(--red-d);}
  .pv-play:disabled{opacity:0.4;cursor:not-allowed;}
  .pv-play:active{transform:scale(0.95);}
  .pv-play.pv-play-loading{opacity:0.8;}
  .pv-play-spin{display:inline-block;width:22px;height:22px;border:2.5px solid rgba(255,255,255,0.25);border-top-color:white;border-radius:50%;animation:pv-spin 0.8s linear infinite;}

  /* Header stem-loading progress bar */
  .pv-load-bar{margin:-6px 0 18px;padding:10px 14px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:10px;transition:opacity 0.3s;}
  .pv-load-bar.hidden{display:none;}
  .pv-load-bar-text{font-size:12px;font-weight:600;color:#FCD34D;margin-bottom:6px;font-variant-numeric:tabular-nums;}
  .pv-load-bar-track{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;}
  .pv-load-bar-fill{height:100%;background:#FBBF24;border-radius:100px;transition:width 0.15s;width:0;}
  .pv-skip{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.85);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .pv-skip:hover{background:rgba(255,255,255,0.1);color:white;}
  .pv-time{font-family:monospace;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.9);text-align:center;padding:4px 0 8px;}
  .pv-time-sep{color:rgba(255,255,255,0.35);margin:0 6px;}

  .pv-scrub{width:100%;max-width:100%;min-width:0;display:block;accent-color:var(--red);margin:4px 0 14px;height:28px;box-sizing:border-box;}

  .pv-transport-bottom{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .pv-speed{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .pv-speed-label{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:rgba(255,255,255,0.5);font-weight:600;margin-right:4px;}
  .pv-speed-chip{padding:8px 12px;min-height:36px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:100px;color:rgba(255,255,255,0.75);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
  .pv-speed-chip.active{background:var(--red);border-color:var(--red);color:white;}
  .pv-loop-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.75);cursor:pointer;margin-left:auto;padding:6px 10px;border-radius:8px;}
  .pv-loop-toggle input{accent-color:var(--red);cursor:pointer;width:18px;height:18px;}
  .pv-loop-toggle .dot{width:8px;height:8px;border-radius:50%;background:#FBBF24;display:none;animation:pv-pulse 1s ease-in-out infinite;}
  .pv-loop-toggle.looping .dot{display:inline-block;}
  @keyframes pv-pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  /* Transpose card — Phase 2: pre-computed variants with state-aware chips */
  .pv-transpose-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
  .pv-transpose-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
  .pv-transpose-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:4px;}
  .pv-transpose-value{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .pv-tx-orig{font-family:'Lora',serif;font-size:18px;font-weight:600;color:rgba(255,255,255,0.55);}
  .pv-tx-arrow{color:rgba(255,255,255,0.35);font-size:14px;}
  .pv-tx-target{font-family:'Lora',serif;font-size:22px;font-weight:700;color:#FBBF24;}
  .pv-tx-st{font-size:11px;color:rgba(255,255,255,0.5);font-variant-numeric:tabular-nums;}
  .pv-tx-reset{background:none;border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.7);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;padding:6px 10px;border-radius:6px;flex-shrink:0;min-height:32px;}
  .pv-tx-reset:hover:not(:disabled){background:rgba(255,255,255,0.08);color:white;}
  .pv-tx-reset:disabled{opacity:0.4;cursor:not-allowed;}
  .pv-tx-chips{display:flex;gap:4px;overflow-x:auto;overflow-y:hidden;padding:2px 0 6px;-webkit-overflow-scrolling:touch;width:100%;max-width:100%;margin-bottom:10px;}
  .pv-tx-chips::-webkit-scrollbar{display:none;}
  .pv-tx-chip{flex:0 0 auto;padding:8px 12px;min-height:36px;min-width:44px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:13px;font-weight:600;cursor:pointer;font-family:'Lora',serif;white-space:nowrap;position:relative;}
  .pv-tx-chip:hover:not(:disabled){background:rgba(255,255,255,0.1);}
  .pv-tx-chip:disabled{cursor:not-allowed;}
  .pv-tx-chip.active{background:#FBBF24;border-color:#FBBF24;color:#1a1a1a;}
  .pv-tx-chip.ready::after{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#22C55E;}
  .pv-tx-chip.generating{opacity:0.7;}
  .pv-tx-chip.generating::after{content:'';position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#FBBF24;animation:pv-pulse 1.2s ease-in-out infinite;}
  @keyframes pv-pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}
  .pv-tx-hint{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.4;}
  .pv-tx-hint strong{color:rgba(255,255,255,0.7);font-weight:600;}
  .pv-tx-pending{font-size:12px;color:#FCD34D;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:8px 12px;margin-bottom:10px;line-height:1.4;animation:pv-fade-in 0.2s ease-out;}
  .pv-tx-pending strong{color:#FBBF24;font-weight:700;}
  @keyframes pv-fade-in{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
  .pv-tx-progress{margin-top:10px;padding:12px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);border-radius:10px;}
  .pv-tx-progress-label{font-size:12px;font-weight:600;color:#FCD34D;margin-bottom:8px;}
  .pv-tx-progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;overflow:hidden;margin-bottom:6px;}
  .pv-tx-progress-fill{height:100%;background:#FBBF24;border-radius:100px;transition:width 0.2s;}
  .pv-tx-progress-detail{font-size:11px;color:rgba(255,255,255,0.55);line-height:1.4;}

  /* Stem mixer — two-line row for proper slider + button sizes on mobile */
  .pv-mixer{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px 16px;margin-bottom:16px;}
  .pv-mixer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .pv-mixer-title{font-size:12px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:rgba(255,255,255,0.7);}
  .pv-mixer-reset{background:none;border:none;color:rgba(255,255,255,0.55);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:8px 4px;}
  .pv-mixer-reset:hover{color:white;}
  .pv-stem-row{display:flex;flex-direction:column;gap:8px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.06);}
  .pv-stem-row:first-of-type{border-top:none;padding-top:4px;}
  .pv-stem-row:last-of-type{padding-bottom:4px;}
  .pv-stem-head{display:flex;align-items:center;gap:10px;}
  .pv-stem-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .pv-stem-name{font-size:14px;font-weight:600;color:rgba(255,255,255,0.9);flex:1;min-width:0;}
  .pv-stem-btns{display:flex;gap:6px;flex-shrink:0;}
  .pv-stem-btn{width:40px;height:40px;border-radius:8px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.7);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;}
  .pv-stem-btn:hover{background:rgba(255,255,255,0.08);}
  .pv-stem-btn.active{background:var(--red);border-color:var(--red);color:white;}
  .pv-stem-btn.mute.active{background:#6B7280;border-color:#6B7280;}
  .pv-stem-slider{width:100%;max-width:100%;min-width:0;display:block;accent-color:var(--red);cursor:pointer;height:32px;box-sizing:border-box;}
  .pv-stem-loading{width:14px;height:14px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--red);border-radius:50%;animation:pv-spin 0.8s linear infinite;flex-shrink:0;}
  @keyframes pv-spin{to{transform:rotate(360deg);}}
  .pv-stem-missing{font-size:12px;color:rgba(255,255,255,0.35);font-style:italic;}

  /* Footer */
  .pv-footer{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;text-align:center;}
  .pv-practise-btn{padding:13px 24px;min-height:48px;border-radius:10px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .pv-practise-btn:hover{background:var(--red);color:white;}
  .pv-practise-btn.done{background:var(--green);border-color:var(--green);color:white;}
  .pv-practise-count{font-size:12px;color:rgba(255,255,255,0.5);margin-top:10px;}

  /* Loading / error states */
  .pv-loading-splash{padding:48px 24px;text-align:center;color:rgba(255,255,255,0.75);}
  .pv-loading-title{font-family:'Lora',serif;font-size:20px;margin-bottom:8px;}
  .pv-loading-bar{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:100px;margin:16px auto;overflow:hidden;}
  .pv-loading-fill{height:100%;background:var(--red);border-radius:100px;transition:width 0.2s;width:0;}
  .pv-loading-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-top:10px;}

  .pv-error{padding:32px 24px;text-align:center;color:rgba(255,255,255,0.75);background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:14px;}

  /* Responsive */
  @media(max-width:480px){
    .pv-wrap{padding:16px 14px 32px;}
    .pv-header{gap:12px;margin-bottom:18px;}
    .pv-arr-name{font-size:20px;}
    .pv-song-title{font-size:10px;}
    /* Make the bottom transport row stack cleanly on very narrow screens */
    .pv-transport-bottom{gap:8px;}
    .pv-loop-toggle{margin-left:0;margin-top:4px;width:100%;justify-content:flex-end;}
  }

  /* Hide the main app chrome on practice view — this is a dedicated playback UI */
  .topbar{display:none;}
  .sidebar{display:none;}
  .app-body{padding-top:0;}
  .mobile-nav{display:none !important;}
</style>
</head>
<body>

<!-- ── AUTH SCREEN (shared pattern) ─────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo-block">
      <div class="auth-logo-icon"><svg viewBox="0 0 16 16" fill="none"><rect x="6.5" y="1" width="3" height="14" rx="0.5" fill="white"/><rect x="1" y="5.5" width="14" height="3" rx="0.5" fill="white"/></svg></div>
      <div><div class="auth-logo-name">Calvary OS</div><div class="auth-logo-church">Calvary Hephzibah</div></div>
    </div>
    <div class="auth-step active" id="step-who">
      <div class="auth-h">Good to see you 👋</div>
      <div class="auth-sub">Select your name to get started.</div>
      <div class="user-grid" id="user-grid"></div>
    </div>
    <div class="auth-step" id="step-pin">
      <button class="pin-back" onclick="COS._goBack()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg> Back</button>
      <div class="pin-name" id="pin-user-name">Enter your PIN</div>
      <div class="pin-sub">4-digit PIN to continue</div>
      <div class="pin-dots"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>
      <div class="pin-pad">
        <button class="pkey" onclick="COS.pk('1')">1</button><button class="pkey" onclick="COS.pk('2')">2</button><button class="pkey" onclick="COS.pk('3')">3</button>
        <button class="pkey" onclick="COS.pk('4')">4</button><button class="pkey" onclick="COS.pk('5')">5</button><button class="pkey" onclick="COS.pk('6')">6</button>
        <button class="pkey" onclick="COS.pk('7')">7</button><button class="pkey" onclick="COS.pk('8')">8</button><button class="pkey" onclick="COS.pk('9')">9</button>
        <button class="pkey" style="visibility:hidden"></button><button class="pkey" onclick="COS.pk('0')">0</button><button class="pkey del" onclick="COS.pdel()">⌫</button>
      </div>
      <div class="pin-msg" id="pin-msg"></div>
    </div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────────────────── -->
<div id="app">
  <div class="app-body">
    <div class="main">
      <div class="pv-wrap" id="pv-wrap">

        <!-- Loading splash until arrangement data is fetched -->
        <div class="pv-loading-splash" id="pv-loading">
          <div class="pv-loading-title">Loading arrangement…</div>
          <div class="pv-loading-bar"><div class="pv-loading-fill" id="pv-loading-fill"></div></div>
          <div class="pv-loading-sub" id="pv-loading-sub">Fetching slots and part notes…</div>
        </div>

        <!-- Main UI (hidden until load completes) -->
        <div id="pv-main" style="display:none;">

          <!-- Header -->
          <div class="pv-header">
            <a href="#" class="pv-back" id="pv-back-btn">←</a>
            <div class="pv-hdr-body">
              <div class="pv-song-title" id="pv-song-title">Loading…</div>
              <div class="pv-arr-name" id="pv-arr-name">Arrangement</div>
              <div class="pv-meta" id="pv-meta"></div>
            </div>
          </div>

          <!-- Stem loading progress bar — shown while audio is downloading.
               Hides itself automatically once all stems are loaded. -->
          <div class="pv-load-bar hidden" id="pv-load-bar">
            <div class="pv-load-bar-text" id="pv-load-text">Loading stems…</div>
            <div class="pv-load-bar-track"><div class="pv-load-bar-fill" id="pv-load-fill"></div></div>
          </div>

          <!-- Part selector -->
          <div class="pv-parts" id="pv-parts"></div>

          <!-- Direction cards (worship leader + part notes) -->
          <div class="pv-direction" id="pv-direction-wl" style="display:none;">
            <div class="pv-direction-label">Worship leader</div>
            <div class="pv-direction-text" id="pv-wl-text"></div>
          </div>
          <div class="pv-direction" id="pv-direction-part" style="display:none;">
            <div class="pv-direction-label" id="pv-part-label">For your part</div>
            <div class="pv-direction-text" id="pv-part-text"></div>
          </div>

          <!-- Section ribbon -->
          <div id="pv-ribbon-container">
            <div class="pv-ribbon" id="pv-ribbon"></div>
          </div>

          <!-- Transport -->
          <div class="pv-transport">
            <div class="pv-transport-top">
              <button class="pv-skip" onclick="skipBy(-5)" title="Back 5s">−5s</button>
              <button class="pv-play" id="pv-play" onclick="togglePlay()" disabled>▶</button>
              <button class="pv-skip" onclick="skipBy(5)" title="Forward 5s">+5s</button>
            </div>
            <div class="pv-time">
              <span id="pv-cur">0:00</span>
              <span class="pv-time-sep">/</span>
              <span id="pv-dur">0:00</span>
            </div>
            <input type="range" class="pv-scrub" id="pv-scrub" min="0" max="100" step="0.1" value="0" oninput="onScrub(this.value)">
            <div class="pv-transport-bottom">
              <div class="pv-speed">
                <span class="pv-speed-label">Speed</span>
                <button class="pv-speed-chip" onclick="setSpeed(0.5)" data-speed="0.5">0.5×</button>
                <button class="pv-speed-chip" onclick="setSpeed(0.75)" data-speed="0.75">0.75×</button>
                <button class="pv-speed-chip active" onclick="setSpeed(1)" data-speed="1">1×</button>
                <button class="pv-speed-chip" onclick="setSpeed(1.25)" data-speed="1.25">1.25×</button>
              </div>
              <label class="pv-loop-toggle" id="pv-loop-toggle">
                <span class="dot"></span>
                <input type="checkbox" id="pv-loop-cb" onchange="onLoopToggle()">
                <span>Loop slot</span>
              </label>
            </div>
          </div>

          <!-- Transpose (Phase 2: pre-computed variants) -->
          <div class="pv-transpose-card" id="pv-transpose" style="display:none;"></div>

          <!-- Stem mixer -->
          <div class="pv-mixer">
            <div class="pv-mixer-header">
              <div class="pv-mixer-title">Stem mixer</div>
              <button class="pv-mixer-reset" onclick="resetMix()">Reset mix</button>
            </div>
            <div id="pv-stems"></div>
          </div>

          <!-- Footer -->
          <div class="pv-footer">
            <button class="pv-practise-btn" id="pv-practise-btn" onclick="markPractised()">✓ Mark as practised</button>
            <div class="pv-practise-count" id="pv-practise-count"></div>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../shell.js"></script>
<script>

// ── CONSTANTS ────────────────────────────────────────────────
const PARTS = [
  { key:'drums',      label:'Drums',       icon:'🥁', stem:'drums' },
  { key:'bass',       label:'Bass',        icon:'🎸', stem:'bass' },
  { key:'keys',       label:'Keys',        icon:'🎹', stem:'keys' },
  { key:'electric',   label:'Electric',    icon:'⚡', stem:'guitar' },
  { key:'acoustic',   label:'Acoustic',    icon:'🎵', stem:'guitar' },
  { key:'lead_vocal', label:'Lead vocal',  icon:'🎤', stem:'vocals' },
  { key:'bv',         label:'BV',          icon:'👥', stem:'vocals' },
];

const STEMS = [
  { key:'vocals',    label:'Vocals',    icon:'🎤' },
  { key:'drums',     label:'Drums',     icon:'🥁' },
  { key:'bass',      label:'Bass',      icon:'🎸' },
  { key:'keys',      label:'Keys',      icon:'🎹' },
  { key:'guitar',    label:'Guitar',    icon:'🎸' },
  { key:'other',     label:'Other',     icon:'🎶' },
  { key:'strings',   label:'Strings',   icon:'🎻' },
  { key:'metronome', label:'Metronome', icon:'🎯' },
];

// Auto-mix presets: when user picks a part, this is how stems default.
// Keys are stem names; values are 0-1 gains.
const AUTO_MIX = {
  drums:      { drums:1.0, bass:0.7, vocals:0.5, keys:0.5, guitar:0.5, other:0.4, strings:0.4, metronome:0.0 },
  bass:       { bass:1.0, drums:0.8, vocals:0.5, keys:0.5, guitar:0.5, other:0.4, strings:0.4, metronome:0.0 },
  keys:       { keys:1.0, drums:0.7, bass:0.7, vocals:0.5, guitar:0.4, other:0.4, strings:0.5, metronome:0.0 },
  electric:   { guitar:1.0, drums:0.7, bass:0.7, vocals:0.5, keys:0.4, other:0.4, strings:0.3, metronome:0.0 },
  acoustic:   { guitar:1.0, drums:0.6, bass:0.6, vocals:0.6, keys:0.5, other:0.4, strings:0.3, metronome:0.0 },
  lead_vocal: { vocals:1.0, drums:0.6, bass:0.6, keys:0.5, guitar:0.5, other:0.4, strings:0.4, metronome:0.0 },
  bv:         { vocals:0.4, drums:0.7, bass:0.7, keys:0.6, guitar:0.6, other:0.5, strings:0.5, metronome:0.0 },
};

// ── STATE ────────────────────────────────────────────────────
const state = {
  arrangement: null,
  song: null,
  reference: null,
  slots: [],          // ordered array of { section_id, notes, chop: {label, start_seconds, end_seconds} }
  parts: {},          // { drums: 'notes…', bass: '…', ... }

  // Audio engine state
  audioCtx: null,
  stems: {},          // { vocals: {buffer, gain, source, volume, muted, solo, loading, loaded, path}, ... }
  currentPart: null,

  // Transpose (Phase 2: pre-computed variants)
  // The app generates pitch-shifted versions of each stem once, stores
  // them in Supabase, and switches audio files when the user picks a
  // different key. No real-time pitch processing during playback.
  transposeSemitones: 0,         // -7..+7 (0 = original)
  availableVariants: {},         // { '-2': {vocals: 'path', drums: 'path', ...}, '+3': {...} }
  variantGeneration: null,       // when generating: { semitones, progress (0-1), stemStatuses {vocals:'done'|'pending', ...} }
  workletReadyForOffline: false, // tracks whether SoundTouch worklet is ready for offline rendering

  // Playback state — all in "arrangement time" (0..totalDuration)
  arrTime: 0,         // current position in arrangement time
  startedAt: 0,       // AudioContext time when playback started
  startOffset: 0,     // arrangement time at which playback started
  playing: false,
  playbackRate: 1,
  totalDuration: 0,

  // UI state
  currentSlotIdx: -1,
  loopSlotIdx: -1,    // -1 means no loop
  rafId: null,
  scrubbing: false,
};

// ── BOOT ─────────────────────────────────────────────────────
function pageInit(){
  // Load preferred part from localStorage or default to lead_vocal
  const savedPart = localStorage.getItem('pv_part') || 'lead_vocal';
  state.currentPart = savedPart;
  loadArrangement();
}

// ── LOAD ─────────────────────────────────────────────────────
async function loadArrangement(){
  const params = new URLSearchParams(location.search);
  const arrId = params.get('arrangement_id') || params.get('id');
  if(!arrId){
    showError('No arrangement specified.', 'Open this page via a specific arrangement from Rehearsal Studio.');
    return;
  }

  setLoadingProgress(0.1, 'Fetching arrangement…');

  const arrs = await sbFetch(`rs_arrangements?id=eq.${arrId}`);
  if(!arrs || !arrs[0]){ showError('Arrangement not found', 'It may have been deleted.'); return; }
  state.arrangement = arrs[0];

  setLoadingProgress(0.25, 'Fetching song + reference…');

  const [songs, refs] = await Promise.all([
    sbFetch(`rs_songs?id=eq.${state.arrangement.song_id}`),
    state.arrangement.reference_id
      ? sbFetch(`rs_references?id=eq.${state.arrangement.reference_id}`)
      : Promise.resolve([])
  ]);
  state.song = (songs && songs[0]) || null;
  state.reference = (refs && refs[0]) || null;

  if(!state.reference){
    showError('No reference linked',
      `<a href="reference.html?arrangement_id=${arrId}" style="color:var(--red);">Add a reference to this arrangement →</a>`);
    return;
  }

  setLoadingProgress(0.45, 'Fetching slots + chops…');

  const [slots, chops, parts, stems] = await Promise.all([
    sbFetch(`rs_arrangement_sections?arrangement_id=eq.${arrId}&order=position.asc`),
    sbFetch(`rs_sections?reference_id=eq.${state.reference.id}&order=position.asc`),
    sbFetch(`rs_arrangement_parts?arrangement_id=eq.${arrId}`),
    sbFetch(`rs_stems?reference_id=eq.${state.reference.id}`)
  ]);

  // Resolve slot.chop by joining slots to chops on section_id
  const chopsById = {};
  (chops || []).forEach(c => { chopsById[c.id] = c; });
  state.slots = (slots || []).map(s => ({
    section_id: s.section_id,
    notes: s.notes || '',
    position: s.position,
    chop: chopsById[s.section_id] || null
  })).filter(s => s.chop);  // drop any orphan slots pointing at deleted chops

  // Part notes
  state.parts = {};
  (parts || []).forEach(p => { state.parts[p.part] = p.notes || ''; });

  // Stems (metadata only — audio is loaded lazily in the background)
  STEMS.forEach(s => {
    const stemRow = (stems || []).find(x => x.stem_type === s.key);
    state.stems[s.key] = {
      type: s.key,
      path: stemRow ? stemRow.audio_path : null,
      exists: !!stemRow,
      buffer: null,
      source: null,
      gain: null,
      volume: 0,  // will be set by auto-mix
      muted: false,
      solo: false,
      loaded: false,
      loading: false,
      failed: false,
      progress: 0  // 0..1 byte-level download progress
    };
  });

  // Compute total arrangement duration as sum of slot durations
  state.totalDuration = state.slots.reduce((sum, s) =>
    sum + (s.chop.end_seconds - s.chop.start_seconds), 0);

  // Apply initial auto-mix for the saved/default part
  applyAutoMix(state.currentPart);

  // Restore saved transpose for this arrangement (if any).
  // Phase 2 only supports whole semitones, so round aggressively in case
  // the saved value came from the Phase 1 slider (which allowed .5 steps).
  try {
    const savedTp = localStorage.getItem('pv_transpose_' + state.arrangement.id);
    if(savedTp !== null){
      const n = parseFloat(savedTp);
      if(!isNaN(n)){
        state.transposeSemitones = Math.max(-7, Math.min(7, Math.round(n)));
      }
    }
  } catch(e){}

  // Load the list of already-generated pitch variants for this reference.
  // Must happen before renderUI() so the transpose chips render with
  // correct state indicators (ready vs needs-generation).
  await loadAvailableVariants();

  // If the saved transpose points at a variant we don't have, reset to 0
  // rather than silently play the wrong thing. A failed generation from
  // a previous session would land us here.
  if(state.transposeSemitones !== 0 && variantStatus(state.transposeSemitones) !== 'ready'){
    console.info('Saved transpose', state.transposeSemitones, 'has no variant — reverting to 0');
    state.transposeSemitones = 0;
  }

  setLoadingProgress(0.7, 'Preparing audio…');

  renderUI();

  setLoadingProgress(1.0, 'Ready.');
  setTimeout(() => {
    document.getElementById('pv-loading').style.display = 'none';
    document.getElementById('pv-main').style.display = 'block';
    // Start downloading all stems in parallel (priority stems get first queue slot)
    startParallelStemLoading();
  }, 300);

  loadPracticeCount();
}

function setLoadingProgress(pct, text){
  const fill = document.getElementById('pv-loading-fill');
  const sub = document.getElementById('pv-loading-sub');
  if(fill) fill.style.width = (pct * 100) + '%';
  if(sub && text) sub.textContent = text;
}

function showError(title, sub){
  const wrap = document.getElementById('pv-wrap');
  wrap.innerHTML = `
    <div class="pv-header">
      <a href="song.html${state.song ? '?id='+state.song.id : ''}" class="pv-back">←</a>
      <div class="pv-hdr-body"><div class="pv-arr-name">${escapeHtml(title)}</div></div>
    </div>
    <div class="pv-error">${sub}</div>`;
}

// ── UI RENDER ────────────────────────────────────────────────
function renderUI(){
  // Header
  document.getElementById('pv-song-title').textContent = state.song ? state.song.title : 'Song';
  document.getElementById('pv-arr-name').textContent = state.arrangement.name || 'Arrangement';
  const meta = [];
  if(state.arrangement.key) meta.push(state.arrangement.key);
  if(state.arrangement.bpm) meta.push(state.arrangement.bpm + ' BPM');
  if(state.totalDuration) meta.push(fmtTime(state.totalDuration));
  meta.push(`${state.slots.length} slot${state.slots.length===1?'':'s'}`);
  document.getElementById('pv-meta').textContent = meta.join(' · ');

  // Back button
  document.getElementById('pv-back-btn').href = state.song
    ? `song.html?id=${state.song.id}`
    : 'index.html';

  // Parts
  renderParts();

  // Direction cards
  renderDirection();

  // Ribbon
  renderRibbon();

  // Stems (mixer rows)
  renderStems();

  // Transpose controls (hidden until worklet ready)
  renderTransposeUI();

  // Duration display
  document.getElementById('pv-dur').textContent = fmtTime(state.totalDuration);
  document.getElementById('pv-scrub').max = state.totalDuration;

  // Play button enabled if we have audio to play
  if(state.slots.length > 0){
    document.getElementById('pv-play').disabled = false;
  }
}

function renderParts(){
  const el = document.getElementById('pv-parts');
  el.innerHTML = PARTS.map(p => `
    <button class="pv-part ${p.key === state.currentPart ? 'active' : ''}" onclick="selectPart('${p.key}')">
      <span class="pv-part-icon">${p.icon}</span>
      <span>${p.label}</span>
    </button>
  `).join('');
}

function renderDirection(){
  const wlEl = document.getElementById('pv-direction-wl');
  const wlText = document.getElementById('pv-wl-text');
  const wl = state.arrangement.worship_leader_notes;
  if(wl && wl.trim()){
    wlEl.style.display = 'block';
    wlText.textContent = wl;
  } else {
    wlEl.style.display = 'none';
  }

  const partEl = document.getElementById('pv-direction-part');
  const partText = document.getElementById('pv-part-text');
  const partLabel = document.getElementById('pv-part-label');
  const partNotes = state.parts[state.currentPart];
  const partDef = PARTS.find(p => p.key === state.currentPart);
  partLabel.textContent = `For ${partDef ? partDef.label.toLowerCase() : 'your part'}`;
  if(partNotes && partNotes.trim()){
    partEl.style.display = 'block';
    partText.textContent = partNotes;
    partText.classList.remove('pv-direction-empty');
  } else {
    partEl.style.display = 'block';
    partText.innerHTML = `<span class="pv-direction-empty">No specific notes for this part. Use the stem mixer to focus.</span>`;
  }
}

function renderRibbon(){
  const el = document.getElementById('pv-ribbon');
  if(state.slots.length === 0){
    el.outerHTML = `
      <div class="pv-ribbon-empty">
        <strong>This arrangement has no slots yet.</strong><br>
        <a href="arrangement.html?id=${state.arrangement.id}">Open the builder to compose it →</a>
      </div>`;
    return;
  }
  el.innerHTML = state.slots.map((s, i) => {
    const dur = s.chop.end_seconds - s.chop.start_seconds;
    return `
      <div class="pv-slot ${i === state.currentSlotIdx ? 'current' : ''} ${i === state.loopSlotIdx ? 'looping' : ''}"
           data-slot-idx="${i}"
           onclick="jumpToSlot(${i})"
           oncontextmenu="event.preventDefault();toggleLoopSlot(${i});return false;"
           title="Tap to jump · Long-press to loop">
        <div class="pv-slot-num">${i + 1}</div>
        <div class="pv-slot-label">${escapeHtml(s.chop.label || 'Unnamed')}</div>
        <div class="pv-slot-dur">${fmtTime(dur)}</div>
      </div>`;
  }).join('');

  // Touch long-press for mobile (oncontextmenu covers desktop right-click)
  el.querySelectorAll('.pv-slot').forEach(slotEl => {
    let pressTimer = null;
    slotEl.addEventListener('touchstart', (e) => {
      pressTimer = setTimeout(() => {
        const idx = parseInt(slotEl.getAttribute('data-slot-idx'));
        toggleLoopSlot(idx);
        pressTimer = null;
      }, 500);
    });
    slotEl.addEventListener('touchend', () => { if(pressTimer){ clearTimeout(pressTimer); } });
    slotEl.addEventListener('touchmove', () => { if(pressTimer){ clearTimeout(pressTimer); } });
  });
}

function renderStems(){
  const el = document.getElementById('pv-stems');
  el.innerHTML = STEMS.map(s => {
    const stem = state.stems[s.key];
    if(!stem.exists){
      return `
        <div class="pv-stem-row" style="opacity:0.4;">
          <div class="pv-stem-head">
            <div class="pv-stem-icon">${s.icon}</div>
            <div class="pv-stem-name">${s.label}</div>
            <div class="pv-stem-missing">not uploaded</div>
          </div>
        </div>`;
    }
    return `
      <div class="pv-stem-row" id="stem-row-${s.key}">
        <div class="pv-stem-head">
          <div class="pv-stem-icon">${s.icon}</div>
          <div class="pv-stem-name">${s.label}</div>
          <div class="pv-stem-btns">
            <button class="pv-stem-btn solo ${stem.solo?'active':''}" id="stem-solo-${s.key}"
                    onclick="toggleStemSolo('${s.key}')" title="Solo">S</button>
            <button class="pv-stem-btn mute ${stem.muted?'active':''}" id="stem-mute-${s.key}"
                    onclick="toggleStemMute('${s.key}')" title="Mute">M</button>
          </div>
        </div>
        <input type="range" class="pv-stem-slider" id="stem-vol-${s.key}"
               min="0" max="1" step="0.01" value="${stem.volume}"
               oninput="setStemVolume('${s.key}', parseFloat(this.value))">
      </div>`;
  }).join('');
}

// ── PART SELECTION ───────────────────────────────────────────
function selectPart(partKey){
  state.currentPart = partKey;
  localStorage.setItem('pv_part', partKey);
  applyAutoMix(partKey);
  renderParts();
  renderDirection();
  renderStems();
  // Kick off downloads for the stems this part needs — no-op if already loaded
  const partStem = PARTS.find(p => p.key === partKey)?.stem;
  if(partStem) ensureStemLoaded(partStem);
  ensureStemLoaded('vocals');
  // Apply volumes to any currently-loaded gain nodes
  applyVolumesToLiveNodes();
  // Re-sync loading UI now that priority stems may have changed
  recalcLoadProgress();
  // Re-draw loading indicators on each stem row (renderStems wiped them)
  STEMS.forEach(s => renderStemLoadingUI(s.key));
}

function applyAutoMix(partKey){
  const mix = AUTO_MIX[partKey] || {};
  STEMS.forEach(s => {
    const v = mix[s.key] !== undefined ? mix[s.key] : 0.5;
    state.stems[s.key].volume = v;
    state.stems[s.key].muted = false;
    state.stems[s.key].solo = false;
  });
}

function resetMix(){
  applyAutoMix(state.currentPart);
  renderStems();
  applyVolumesToLiveNodes();
}

// ── STEM CONTROLS ────────────────────────────────────────────
function setStemVolume(stemKey, v){
  state.stems[stemKey].volume = v;
  if(state.stems[stemKey].muted) state.stems[stemKey].muted = false;
  applyVolumesToLiveNodes();
  const muteBtn = document.getElementById('stem-mute-' + stemKey);
  if(muteBtn) muteBtn.classList.remove('active');
}

function toggleStemMute(stemKey){
  state.stems[stemKey].muted = !state.stems[stemKey].muted;
  document.getElementById('stem-mute-' + stemKey).classList.toggle('active', state.stems[stemKey].muted);
  applyVolumesToLiveNodes();
}

function toggleStemSolo(stemKey){
  const newSolo = !state.stems[stemKey].solo;
  // Clear all solos; then set this one (exclusive)
  STEMS.forEach(s => {
    state.stems[s.key].solo = false;
    const btn = document.getElementById('stem-solo-' + s.key);
    if(btn) btn.classList.remove('active');
  });
  if(newSolo){
    state.stems[stemKey].solo = true;
    document.getElementById('stem-solo-' + stemKey).classList.add('active');
    // When soloing, we need that stem loaded
    ensureStemLoaded(stemKey);
  }
  applyVolumesToLiveNodes();
}

// Compute the effective gain for a stem given volume/mute/solo flags
function effectiveGain(stemKey){
  const s = state.stems[stemKey];
  if(!s || !s.exists) return 0;
  // If any stem is soloed, only soloed stems play
  const anySolo = STEMS.some(x => state.stems[x.key].solo);
  if(anySolo && !s.solo) return 0;
  if(s.muted) return 0;
  return s.volume;
}

// Push current effective gains to any GainNodes that exist
function applyVolumesToLiveNodes(){
  if(!state.audioCtx) return;
  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(stem.gain){
      stem.gain.gain.setValueAtTime(effectiveGain(s.key), state.audioCtx.currentTime);
    }
  });
}

// ── AUDIO ENGINE ─────────────────────────────────────────────
//
// Phase 2 architecture: the playback engine is simple again.
// No real-time pitch shifting during playback — stems play through
// plain BufferSource → GainNode → destination. When the user picks
// a different key, we load different (pre-shifted) stem files and
// restart playback. See the TRANSPOSE section below for the offline
// render path that generates those shifted files.
//
// Chain per stem: BufferSource → GainNode → destination

function ensureAudioContext(){
  if(state.audioCtx) return state.audioCtx;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Worklet registration is initiated only when the user first tries
  // to generate a variant — see generateVariantForKey(). We don't
  // register on page load because most sessions never transpose.
  return state.audioCtx;
}

// ── TRANSPOSE (Phase 2) ──────────────────────────────────────
//
// Generate a pitch-shifted version of each stem once, store it
// in Supabase, and swap playback to those files when the user
// picks a different key. The shifting uses SoundTouch inside an
// OfflineAudioContext, which renders faster than real-time.
//
// Flow on first tap of a new key:
//   1. Create OfflineAudioContext per stem
//   2. Register SoundTouch worklet on each context
//   3. Run buffer → SoundTouchNode → destination at N semitones
//   4. Encode rendered buffer as MP3 (via lamejs)
//   5. Upload to Supabase Storage
//   6. Record in rs_stem_variants table
//   7. Swap active stems to the new paths and restart playback
//
// Steps 2-6 happen in parallel across all 7 stems.

const NOTES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

// Compute resulting key when originalKey is transposed by N semitones.
function transposeKey(originalKey, semitones){
  if(!originalKey) return null;
  const key = originalKey.trim();
  const minor = /m$/i.test(key) && !/maj/i.test(key);
  const root = key.replace(/m$|maj$|min$/i, '').trim();
  let idx = NOTES_SHARP.indexOf(root);
  if(idx < 0) idx = NOTES_FLAT.indexOf(root);
  if(idx < 0) return null;
  const newIdx = ((idx + Math.round(semitones)) % 12 + 12) % 12;
  const usesFlats = NOTES_FLAT.indexOf(root) >= 0 && NOTES_SHARP.indexOf(root) < 0;
  const newNote = usesFlats ? NOTES_FLAT[newIdx] : NOTES_SHARP[newIdx];
  return newNote + (minor ? 'm' : '');
}

// Fetch the list of pre-generated variants for this reference. Called once
// on arrangement load; result stored in state.availableVariants.
async function loadAvailableVariants(){
  if(!state.reference || !state.reference.id) return;
  try {
    const rows = await sbFetch(
      `rs_stem_variants?reference_id=eq.${state.reference.id}` +
      `&select=stem_type,semitones,audio_path`
    );
    const byKey = {};
    (rows || []).forEach(r => {
      const k = String(r.semitones);
      if(!byKey[k]) byKey[k] = {};
      byKey[k][r.stem_type] = r.audio_path;
    });
    state.availableVariants = byKey;
  } catch(err){
    console.error('Failed to load variants:', err);
    state.availableVariants = {};
  }
}

// Check whether a given semitone value has all 7 (or all available) stems
// already generated. Returns 'ready' | 'partial' | 'none'.
function variantStatus(semitones){
  if(semitones === 0) return 'ready';  // original
  const key = String(semitones);
  const variant = state.availableVariants[key];
  if(!variant) return 'none';
  // Count how many stems this arrangement has, and how many variants exist
  const expectedStems = STEMS.filter(s => state.stems[s.key].exists).length;
  const gotStems = Object.keys(variant).length;
  if(gotStems >= expectedStems) return 'ready';
  return 'partial';
}

async function generateVariantForKey(semitones){

// Placeholder — will be fully implemented in Chunk 3.
async function setTranspose(semitones){
  const n = Math.max(-7, Math.min(7, Math.round(parseFloat(semitones) || 0)));
  if(n === state.transposeSemitones) return;

  // If target variant isn't ready, kick off generation instead of switching
  if(n !== 0 && variantStatus(n) !== 'ready'){
    return generateVariantForKey(n);
  }

  // For now (Chunk 1) we only support switching to the original key (n=0).
  // Full key-swap logic (reload stems, restart playback) comes in Chunk 3.
  state.transposeSemitones = n;
  try {
    localStorage.setItem('pv_transpose_' + state.arrangement.id, String(n));
  } catch(e){}
  renderTransposeUI();
}

// Render the transpose card. Shows one chip per semitone in range, with
// state indicators (green dot = ready, amber pulse = generating, nothing
// = not yet generated, tap to generate).
function renderTransposeUI(){
  const container = document.getElementById('pv-transpose');
  if(!container) return;

  const originalKey = state.arrangement ? state.arrangement.key : null;

  // If the arrangement has no key set, there's nothing meaningful to
  // transpose against — hide the card entirely. Admins can set the key
  // on the arrangement builder if they want to enable transpose.
  if(!originalKey){
    container.style.display = 'none';
    return;
  }
  container.style.display = '';

  const st = state.transposeSemitones;
  const targetKey = transposeKey(originalKey, st);
  const stLabel = st > 0 ? `+${st}` : String(st);

  // Generation progress panel (if currently generating)
  const gen = state.variantGeneration;
  let progressHTML = '';
  if(gen){
    const pct = Math.round((gen.progress || 0) * 100);
    const stemList = Object.entries(gen.stemStatuses || {})
      .map(([k, v]) => `${escapeHtml(k)}: ${escapeHtml(v)}`)
      .join(' · ');
    const targetK = transposeKey(originalKey, gen.semitones);
    progressHTML = `
      <div class="pv-tx-progress">
        <div class="pv-tx-progress-label">Generating ${escapeHtml(targetK || '')} version… ${pct}%</div>
        <div class="pv-tx-progress-bar"><div class="pv-tx-progress-fill" style="width:${pct}%"></div></div>
        <div class="pv-tx-progress-detail">${stemList}</div>
      </div>`;
  }

  // Build chips — one per semitone, with state-based classes
  const chips = [];
  for(let s = -7; s <= 7; s++){
    const k = transposeKey(originalKey, s);
    if(!k) continue;
    const status = variantStatus(s);
    const classes = ['pv-tx-chip'];
    if(Math.round(s) === Math.round(st)) classes.push('active');
    if(status === 'ready' && s !== 0) classes.push('ready');
    if(gen && gen.semitones === s) classes.push('generating');
    const disabled = gen ? 'disabled' : '';
    const title = s === 0
      ? 'Original key'
      : status === 'ready'
        ? `${s > 0 ? '+' : ''}${s} semitones (ready)`
        : `${s > 0 ? '+' : ''}${s} semitones (tap to generate)`;
    chips.push(`
      <button class="${classes.join(' ')}" onclick="setTranspose(${s})" ${disabled} title="${escapeHtml(title)}">
        ${escapeHtml(k)}
      </button>`);
  }

  container.innerHTML = `
    <div class="pv-transpose-head">
      <div>
        <div class="pv-transpose-label">Transpose</div>
        <div class="pv-transpose-value">
          ${originalKey ? `<span class="pv-tx-orig">${escapeHtml(originalKey)}</span>` : ''}
          ${originalKey && targetKey ? `<span class="pv-tx-arrow">→</span>` : ''}
          ${targetKey ? `<span class="pv-tx-target">${escapeHtml(targetKey)}</span>` : ''}
          <span class="pv-tx-st">(${stLabel} st)</span>
        </div>
      </div>
      <button class="pv-tx-reset" onclick="setTranspose(0)" ${st === 0 || gen ? 'disabled' : ''}>Reset</button>
    </div>
    <div class="pv-tx-chips">${chips.join('')}</div>
    ${state._pendingSemitones !== null && state._pendingSemitones !== undefined ? `
      <div class="pv-tx-pending">
        ✓ Tap registered — you selected <strong>${escapeHtml(transposeKey(originalKey, state._pendingSemitones) || '')}</strong>.
        Generation lands in the next build.
      </div>` : ''}
    <div class="pv-tx-hint">
      <strong>Phase 2 foundation</strong> — the new architecture pre-computes each key as a file. Chip taps will trigger generation in the next build. For now, playback is locked to the original key.
    </div>
    ${progressHTML}
  `;
}

// Load a single stem: fetch with progress streaming, decode, cache in memory.
// Retries once on failure with a 1s delay. Updates state.stems[].progress (0-1)
// as bytes stream in, and fires recalcLoadProgress() after each state change
// so the header progress bar and play button stay in sync.
async function ensureStemLoaded(stemKey, {isRetry = false} = {}){
  const stem = state.stems[stemKey];
  if(!stem || !stem.exists) return null;
  if(stem.loaded) return stem.buffer;
  if(stem.loading) {
    // Already in progress elsewhere — return a promise that resolves when it completes
    return new Promise((resolve) => {
      const check = () => {
        if(stem.loaded) resolve(stem.buffer);
        else if(!stem.loading) resolve(null);
        else setTimeout(check, 100);
      };
      check();
    });
  }
  if(stem.failed && !isRetry) return null;

  stem.loading = true;
  stem.failed = false;
  stem.progress = 0;
  renderStemLoadingUI(stemKey);
  recalcLoadProgress();

  try {
    const ctx = ensureAudioContext();
    const url = publicUrl(stem.path);
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);

    // Stream the response to track progress. If content-length is missing
    // (some CDNs), we fall back to indeterminate progress.
    const contentLength = parseInt(res.headers.get('content-length') || '0', 10);
    let arrayBuffer;

    if(contentLength > 0 && res.body && res.body.getReader){
      const reader = res.body.getReader();
      const chunks = [];
      let received = 0;
      while(true){
        const { done, value } = await reader.read();
        if(done) break;
        chunks.push(value);
        received += value.length;
        stem.progress = Math.min(1, received / contentLength);
        recalcLoadProgress();  // updates header bar in real time
      }
      // Concatenate chunks into one ArrayBuffer
      const buf = new Uint8Array(received);
      let offset = 0;
      for(const chunk of chunks){
        buf.set(chunk, offset);
        offset += chunk.length;
      }
      arrayBuffer = buf.buffer;
    } else {
      arrayBuffer = await res.arrayBuffer();
      stem.progress = 0.9;  // show almost-done; decode is still pending
      recalcLoadProgress();
    }

    // Decode is async and can take 500ms+ for a 6MB MP3
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
    stem.buffer = audioBuffer;
    stem.loaded = true;
    stem.progress = 1;

    // Create a GainNode for this stem (persists across plays)
    if(!stem.gain){
      stem.gain = ctx.createGain();
      stem.gain.connect(ctx.destination);
      stem.gain.gain.value = effectiveGain(stemKey);
    }
  } catch(err){
    console.error('Failed to load stem ' + stemKey + ':', err);
    stem.loading = false;
    stem.progress = 0;
    if(!isRetry){
      // Retry once after a short delay
      renderStemLoadingUI(stemKey);
      recalcLoadProgress();
      await new Promise(r => setTimeout(r, 1000));
      return ensureStemLoaded(stemKey, {isRetry: true});
    }
    stem.failed = true;
    renderStemLoadingUI(stemKey);
    recalcLoadProgress();
    return null;
  }

  stem.loading = false;
  renderStemLoadingUI(stemKey);
  recalcLoadProgress();
  return stem.buffer;
}

// Update just the loading indicator for one stem row.
function renderStemLoadingUI(stemKey){
  const stem = state.stems[stemKey];
  const row = document.getElementById('stem-row-' + stemKey);
  if(!row) return;
  const slider = row.querySelector('.pv-stem-slider');
  const existing = document.getElementById('stem-loader-' + stemKey);
  if(existing) existing.remove();

  if(stem.loading){
    if(slider) slider.style.opacity = '0.5';
    const loader = document.createElement('div');
    loader.className = 'pv-stem-loading';
    loader.id = 'stem-loader-' + stemKey;
    const head = row.querySelector('.pv-stem-head');
    const btns = row.querySelector('.pv-stem-btns');
    if(head && btns){
      head.insertBefore(loader, btns);
    } else if(head){
      head.appendChild(loader);
    }
  } else if(stem.failed){
    if(slider) slider.style.opacity = '0.4';
    const warn = document.createElement('div');
    warn.className = 'pv-stem-failed';
    warn.id = 'stem-loader-' + stemKey;
    warn.textContent = '⚠';
    warn.title = 'Failed to load — tap to retry';
    warn.style.cssText = 'color:#FBBF24;font-size:16px;cursor:pointer;padding:6px;';
    warn.onclick = () => ensureStemLoaded(stemKey);
    const head = row.querySelector('.pv-stem-head');
    const btns = row.querySelector('.pv-stem-btns');
    if(head && btns){
      head.insertBefore(warn, btns);
    } else if(head){
      head.appendChild(warn);
    }
  } else if(stem.loaded){
    if(slider) slider.style.opacity = '';
  }
}

// Recalculate overall load progress and update the header bar + play button.
// Called after every stem state change.
function recalcLoadProgress(){
  const existingStems = STEMS.filter(s => state.stems[s.key].exists);
  if(existingStems.length === 0) return;

  // Priority stems: selected part + vocals (drive play-readiness)
  const partStemKey = PARTS.find(p => p.key === state.currentPart)?.stem;
  const priorityKeys = [partStemKey, 'vocals'].filter(Boolean);
  const priorityStems = priorityKeys
    .map(k => state.stems[k])
    .filter(s => s && s.exists);

  // Overall progress (all stems, average of their progress values)
  const total = existingStems.reduce((sum, s) => sum + (state.stems[s.key].progress || 0), 0);
  const avgPct = total / existingStems.length;

  // Priority progress (separate calc for the header bar)
  const priorityTotal = priorityStems.reduce((sum, s) => sum + (s.progress || 0), 0);
  const priorityPct = priorityStems.length ? (priorityTotal / priorityStems.length) : 1;

  // Play-ready when every priority stem is fully loaded
  const playReady = priorityStems.length > 0 && priorityStems.every(s => s.loaded);
  updatePlayButtonState(playReady);

  // Header load bar
  updateHeaderLoadBar(priorityPct, avgPct, playReady);
}

// Update play button: spinner if not ready, ▶/❚❚ otherwise.
function updatePlayButtonState(playReady){
  const btn = document.getElementById('pv-play');
  if(!btn) return;
  if(state.playing){
    btn.disabled = false;
    btn.innerHTML = '❚❚';
    btn.classList.remove('pv-play-loading');
    return;
  }
  if(playReady){
    btn.disabled = false;
    btn.innerHTML = '▶';
    btn.classList.remove('pv-play-loading');
  } else if(state.slots.length === 0){
    btn.disabled = true;
    btn.innerHTML = '▶';
    btn.classList.remove('pv-play-loading');
  } else {
    btn.disabled = true;
    btn.innerHTML = '<span class="pv-play-spin"></span>';
    btn.classList.add('pv-play-loading');
  }
}

// Update the load-progress bar in the header.
function updateHeaderLoadBar(priorityPct, overallPct, playReady){
  const bar = document.getElementById('pv-load-bar');
  const fill = document.getElementById('pv-load-fill');
  const text = document.getElementById('pv-load-text');
  if(!bar || !fill || !text) return;

  if(overallPct >= 0.999){
    // All stems loaded — fade out the bar
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  fill.style.width = Math.round(overallPct * 100) + '%';
  if(!playReady){
    text.textContent = 'Loading your part… ' + Math.round(priorityPct * 100) + '%';
  } else {
    const others = Math.round(overallPct * 100);
    text.textContent = 'Ready ✓  ·  other stems ' + others + '%';
  }
}

// Called once after arrangement data is loaded. Kicks off all stem
// downloads in parallel — priority stems started first in the same tick
// so they tend to get the earliest network slots, others follow.
function startParallelStemLoading(){
  const partStemKey = PARTS.find(p => p.key === state.currentPart)?.stem;
  const priorityKeys = [partStemKey, 'vocals'].filter(Boolean);
  const priority = new Set(priorityKeys);

  const priorityStems = [];
  const secondary = [];
  STEMS.forEach(s => {
    if(!state.stems[s.key].exists) return;
    if(priority.has(s.key)) priorityStems.push(s.key);
    else secondary.push(s.key);
  });

  // Kick off priority first (they get to the fetch queue first)
  priorityStems.forEach(k => ensureStemLoaded(k));
  // Secondary stems: tiny stagger so the browser's HTTP2/fetch prioritisation
  // has already settled on the priority requests before these pile in.
  setTimeout(() => {
    secondary.forEach(k => ensureStemLoaded(k));
  }, 50);

  // Initial progress recalc so the UI shows the loading state right away
  recalcLoadProgress();
}

// Convert arrangement time (0..totalDuration) to reference time (seconds in the MP3)
function arrangementToReferenceTime(arrT){
  let remaining = arrT;
  for(const slot of state.slots){
    const slotDur = slot.chop.end_seconds - slot.chop.start_seconds;
    if(remaining <= slotDur){
      return { refTime: slot.chop.start_seconds + remaining, slot: slot, slotOffset: remaining };
    }
    remaining -= slotDur;
  }
  // Past the end
  if(state.slots.length){
    const lastSlot = state.slots[state.slots.length - 1];
    return { refTime: lastSlot.chop.end_seconds, slot: lastSlot, slotOffset: lastSlot.chop.end_seconds - lastSlot.chop.start_seconds };
  }
  return { refTime: 0, slot: null, slotOffset: 0 };
}

// Compute which slot index the current arrTime falls into
function slotIndexAtArrTime(arrT){
  let cum = 0;
  for(let i = 0; i < state.slots.length; i++){
    const slotDur = state.slots[i].chop.end_seconds - state.slots[i].chop.start_seconds;
    if(arrT < cum + slotDur) return i;
    cum += slotDur;
  }
  return state.slots.length - 1;
}

// Arrangement time at the start of a slot
function slotStartArrTime(idx){
  let cum = 0;
  for(let i = 0; i < idx; i++){
    cum += state.slots[i].chop.end_seconds - state.slots[i].chop.start_seconds;
  }
  return cum;
}

// ── PLAYBACK ─────────────────────────────────────────────────
async function togglePlay(){
  if(state.playing){
    pause();
  } else {
    await play();
  }
}

async function play(){
  const ctx = ensureAudioContext();
  if(ctx.state === 'suspended') await ctx.resume();

  // Make sure at least the selected-part stem + vocals are loaded before starting
  const partStem = PARTS.find(p => p.key === state.currentPart)?.stem;
  const prerequisites = [partStem, 'vocals'].filter(Boolean);
  await Promise.all(prerequisites.map(s => ensureStemLoaded(s)));

  // If every loaded stem has zero effective gain (all muted/soloed out), warn
  const anyAudible = STEMS.some(s => state.stems[s.key].loaded && effectiveGain(s.key) > 0);
  if(!anyAudible){
    COS.toast('All stems are muted — adjust the mixer to hear playback');
  }

  startAllSources(state.arrTime);
  state.playing = true;
  document.getElementById('pv-play').textContent = '❚❚';
  tickPlayback();
}

function pause(){
  stopAllSources();
  state.playing = false;
  document.getElementById('pv-play').textContent = '▶';
  if(state.rafId){ cancelAnimationFrame(state.rafId); state.rafId = null; }
}

// Start all loaded stems playing in lock-step at the given arrangement time
function startAllSources(arrT){
  const ctx = ensureAudioContext();
  const { refTime } = arrangementToReferenceTime(arrT);
  const startAt = ctx.currentTime + 0.02;  // small lead so all sources align
  state.startedAt = startAt;
  state.startOffset = arrT;

  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(!stem.loaded) return;
    // Each play requires a fresh source node
    try { if(stem.source) stem.source.stop(); } catch(e){}
    stem.source = ctx.createBufferSource();
    stem.source.buffer = stem.buffer;
    stem.source.playbackRate.value = state.playbackRate;
    stem.source.connect(stem.gain);
    // Guard against refTime exceeding buffer length (shouldn't happen but safe)
    const offset = Math.min(refTime, stem.buffer.duration - 0.01);
    stem.source.start(startAt, Math.max(0, offset));
  });
}

function stopAllSources(){
  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(stem.source){
      try { stem.source.stop(); } catch(e){}
      stem.source = null;
    }
  });
}

// Main playback tick — runs via RAF while playing
function tickPlayback(){
  if(!state.playing) return;
  const ctx = state.audioCtx;
  if(!ctx){ return; }

  // Current arrangement time = startOffset + (audioTime - startedAt) * playbackRate
  const audioElapsed = Math.max(0, ctx.currentTime - state.startedAt);
  state.arrTime = state.startOffset + audioElapsed * state.playbackRate;

  // End of arrangement?
  if(state.arrTime >= state.totalDuration){
    // If looping a specific slot, bounce back to that slot's start
    if(state.loopSlotIdx >= 0){
      const slotStart = slotStartArrTime(state.loopSlotIdx);
      seek(slotStart);
      state.rafId = requestAnimationFrame(tickPlayback);
      return;
    }
    // Otherwise stop at end
    state.arrTime = state.totalDuration;
    pause();
    updateTimeUI();
    return;
  }

  // Slot-hop detection: did we cross from slot N to slot N+1?
  const slotIdx = slotIndexAtArrTime(state.arrTime);
  if(slotIdx !== state.currentSlotIdx){
    state.currentSlotIdx = slotIdx;
    updateCurrentSlotUI();
    // Handle slot-hop in audio: we need to seek reference audio to the new slot's start
    // Only seek if the slot transition is not "natural" (i.e. slot end doesn't align with next slot start in reference)
    const thisSlotArrStart = slotStartArrTime(slotIdx);
    const thisSlotRefStart = state.slots[slotIdx].chop.start_seconds;
    // Expected reference time based on contiguous playback from startOffset
    // If it differs by more than a tiny epsilon, we need to seek
    if(slotIdx > 0){
      const prevSlot = state.slots[slotIdx - 1];
      const prevSlotRefEnd = prevSlot.chop.end_seconds;
      if(Math.abs(thisSlotRefStart - prevSlotRefEnd) > 0.05){
        // Slots are not contiguous in reference time → seek
        seek(state.arrTime);
      }
    }
  }

  // Loop mode: if we're past the active loop slot's end, seek back
  if(state.loopSlotIdx >= 0 && slotIdx > state.loopSlotIdx){
    const slotStart = slotStartArrTime(state.loopSlotIdx);
    seek(slotStart);
    state.rafId = requestAnimationFrame(tickPlayback);
    return;
  }

  updateTimeUI();
  state.rafId = requestAnimationFrame(tickPlayback);
}

function updateTimeUI(){
  document.getElementById('pv-cur').textContent = fmtTime(state.arrTime);
  if(!state.scrubbing){
    document.getElementById('pv-scrub').value = state.arrTime;
  }
}

function updateCurrentSlotUI(){
  document.querySelectorAll('#pv-ribbon .pv-slot').forEach((el, i) => {
    el.classList.toggle('current', i === state.currentSlotIdx);
  });
  // Scroll the current slot into view
  const activeEl = document.querySelector('#pv-ribbon .pv-slot.current');
  if(activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── SEEK / SKIP / SCRUB ──────────────────────────────────────
function seek(arrT){
  state.arrTime = Math.max(0, Math.min(state.totalDuration, arrT));
  if(state.playing){
    stopAllSources();
    startAllSources(state.arrTime);
  }
  state.currentSlotIdx = slotIndexAtArrTime(state.arrTime);
  updateCurrentSlotUI();
  updateTimeUI();
}

function skipBy(delta){
  seek(state.arrTime + delta);
}

function onScrub(v){
  state.scrubbing = true;
  const arrT = parseFloat(v);
  document.getElementById('pv-cur').textContent = fmtTime(arrT);
  clearTimeout(state._scrubTimer);
  state._scrubTimer = setTimeout(() => {
    seek(arrT);
    state.scrubbing = false;
  }, 120);
}

function jumpToSlot(idx){
  const arrT = slotStartArrTime(idx);
  seek(arrT);
  if(!state.playing){ play(); }
}

function toggleLoopSlot(idx){
  if(state.loopSlotIdx === idx){
    state.loopSlotIdx = -1;
    COS.toast('Loop off');
  } else {
    state.loopSlotIdx = idx;
    document.getElementById('pv-loop-cb').checked = true;
    document.getElementById('pv-loop-toggle').classList.add('looping');
    COS.toast('Looping: ' + (state.slots[idx].chop.label || 'slot ' + (idx+1)));
    // Seek to the slot start
    jumpToSlot(idx);
    return;  // jumpToSlot already updates UI
  }
  document.getElementById('pv-loop-toggle').classList.toggle('looping', state.loopSlotIdx >= 0);
  renderRibbon();
}

function onLoopToggle(){
  const checked = document.getElementById('pv-loop-cb').checked;
  if(!checked){
    state.loopSlotIdx = -1;
    document.getElementById('pv-loop-toggle').classList.remove('looping');
    renderRibbon();
  } else if(state.loopSlotIdx < 0 && state.currentSlotIdx >= 0){
    // Toggle on → loop the current slot
    state.loopSlotIdx = state.currentSlotIdx;
    document.getElementById('pv-loop-toggle').classList.add('looping');
    renderRibbon();
    COS.toast('Looping: ' + (state.slots[state.currentSlotIdx].chop.label || 'slot'));
  }
}

// ── SPEED ────────────────────────────────────────────────────
function setSpeed(rate){
  state.playbackRate = rate;
  document.querySelectorAll('.pv-speed-chip').forEach(chip => {
    chip.classList.toggle('active', parseFloat(chip.getAttribute('data-speed')) === rate);
  });
  if(state.playing){
    // Re-anchor time reference, then apply rate to live sources
    const ctx = state.audioCtx;
    const audioElapsed = Math.max(0, ctx.currentTime - state.startedAt);
    state.startOffset = state.startOffset + audioElapsed * (state.playbackRate === rate ? 1 : rate);
    // Simpler: just restart from current arrTime with new rate
    seek(state.arrTime);
  }
  STEMS.forEach(s => {
    const stem = state.stems[s.key];
    if(stem.source){
      try { stem.source.playbackRate.value = rate; } catch(e){}
    }
  });
}

// ── PRACTICE LOGGING ─────────────────────────────────────────
async function markPractised(){
  if(!COS.currentUser){ COS.toast('Not logged in'); return; }
  const row = {
    arrangement_id: state.arrangement.id,
    part: state.currentPart,
    duration_seconds: Math.round(state.totalDuration),
    user_name: COS.currentUser.name,
    completed_at: new Date().toISOString()
  };
  const res = await sbPost('rs_practice_sessions', row);
  if(res){
    const btn = document.getElementById('pv-practise-btn');
    btn.classList.add('done');
    btn.textContent = '✓ Logged';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.textContent = '✓ Mark as practised';
    }, 2500);
    loadPracticeCount();
  } else {
    COS.toast('Could not log practice — try again');
  }
}

async function loadPracticeCount(){
  if(!COS.currentUser) return;
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const userName = encodeURIComponent(COS.currentUser.name);
  const sessions = await sbFetch(`rs_practice_sessions?arrangement_id=eq.${state.arrangement.id}&user_name=eq.${userName}&completed_at=gte.${weekAgo}`);
  const count = (sessions || []).length;
  const el = document.getElementById('pv-practise-count');
  if(count === 0){
    el.textContent = '';
  } else {
    el.textContent = `You've practised this ${count} time${count===1?'':'s'} this week.`;
  }
}

// ── UTILS ────────────────────────────────────────────────────
function fmtTime(s){
  if(s === null || s === undefined || isNaN(s)) return '0:00';
  const n = Math.max(0, s);
  const m = Math.floor(n / 60);
  const r = Math.floor(n % 60);
  return `${m}:${r.toString().padStart(2,'0')}`;
}
function escapeHtml(s){
  return (s || '').toString()
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
