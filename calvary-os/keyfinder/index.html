<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0B0E">
<title>Keyfinder · Calvary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Anton&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --obsidian: #0B0B0E;
    --obsidian-elev: #16161A;
    --obsidian-card: #1C1C20;
    --calvary-red: #D0441C;
    --calvary-red-soft: rgba(208,68,28,0.12);
    --sage: #7D8471;
    --cream: #F4EFE6;
    --warm-beige: #C9C3B6;
    --silver: #A29C90;
    --line: rgba(244,239,230,0.08);
    --line-strong: rgba(244,239,230,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--obsidian);
    color: var(--cream);
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    font-weight: 400;
  }

  /* Noise texture overlay — anniversary system */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.90  0 0 0 0.05 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.5;
    mix-blend-mode: overlay;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    padding: max(env(safe-area-inset-top), 20px) 24px max(env(safe-area-inset-bottom), 28px);
    position: relative;
  }

  body > * { position: relative; z-index: 1; }

  /* ====== TOPBAR ====== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 24px;
  }
  .brand {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--calvary-red);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--calvary-red);
  }
  .home-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--warm-beige);
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .home-btn:hover, .home-btn:active {
    color: var(--cream);
    border-color: var(--line-strong);
    background: var(--obsidian-elev);
  }
  .home-btn .home-key {
    color: var(--calvary-red);
    font-weight: 700;
  }

  /* ====== HERO — THE KEY ====== */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px 0 32px;
    position: relative;
  }

  .eyebrow {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--calvary-red);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    width: 28px;
    height: 1px;
    background: var(--calvary-red);
  }

  .keybox {
    position: relative;
    display: inline-flex;
    align-items: baseline;
    justify-content: center;
    gap: 6px;
    margin-bottom: 18px;
  }

  .key-letter {
    font-family: 'Anton', Impact, sans-serif;
    font-weight: 400;
    font-size: clamp(220px, 48vw, 340px);
    line-height: 0.82;
    letter-spacing: -0.04em;
    color: var(--cream);
    text-transform: uppercase;
  }

  .key-accidental {
    font-family: 'Anton', Impact, sans-serif;
    font-weight: 400;
    font-size: clamp(96px, 22vw, 150px);
    line-height: 1;
    color: var(--calvary-red);
    transform: translateY(-0.35em);
    letter-spacing: -0.04em;
  }

  .key-mode {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(22px, 5.5vw, 32px);
    color: var(--calvary-red);
    letter-spacing: 0.02em;
    margin-bottom: 32px;
  }

  .delta {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--silver);
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    border: 1px solid var(--line);
    border-radius: 100px;
  }
  .delta b {
    color: var(--cream);
    font-weight: 700;
  }
  .delta .sep {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--calvary-red);
  }

  /* ====== TRANSPOSE CONTROLS ====== */
  .transpose {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 14px;
    margin-top: 36px;
    margin-bottom: 28px;
  }

  .tbtn {
    flex: 1;
    max-width: 170px;
    background: var(--obsidian-card);
    border: 1px solid var(--line);
    color: var(--cream);
    border-radius: 18px;
    padding: 24px 18px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }
  .tbtn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, var(--calvary-red-soft));
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }
  .tbtn:hover { border-color: var(--line-strong); }
  .tbtn:hover::before { opacity: 1; }
  .tbtn:active {
    transform: scale(0.97);
    border-color: var(--calvary-red);
  }
  .tbtn:active::before { opacity: 1; }

  .tbtn .glyph {
    font-family: 'Anton', Impact, sans-serif;
    font-weight: 400;
    font-size: 44px;
    line-height: 0.9;
    color: var(--calvary-red);
  }
  .tbtn .word {
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--warm-beige);
  }

  /* ====== MODE TOGGLE ====== */
  .mode-toggle {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 22px;
    background: var(--obsidian-card);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 4px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }
  .mode-toggle button {
    background: none;
    border: none;
    color: var(--warm-beige);
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 16px;
    padding: 9px 22px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .mode-toggle button.active {
    background: var(--calvary-red);
    color: var(--cream);
  }

  /* ====== RESET ====== */
  .reset-btn {
    background: none;
    border: 1px dashed var(--line-strong);
    color: var(--silver);
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 11px 20px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin: 0 auto 20px;
    display: block;
  }
  .reset-btn:hover {
    color: var(--cream);
    border-color: var(--warm-beige);
    border-style: solid;
  }
  .reset-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ====== ALSO KNOWN AS ====== */
  .panel {
    background: var(--obsidian-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 22px 22px 20px;
    margin-bottom: 16px;
  }
  .panel-title {
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--calvary-red);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-title::before {
    content: '';
    width: 18px;
    height: 1px;
    background: var(--calvary-red);
  }
  .relative-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    color: var(--warm-beige);
  }
  .relative-row + .relative-row {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .relative-row .k {
    font-style: italic;
    color: var(--silver);
  }
  .relative-row .v {
    color: var(--cream);
    font-family: 'Inter Tight', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }
  .relative-row .v .acc {
    color: var(--calvary-red);
  }

  /* ====== FOOTER ====== */
  .footer {
    text-align: center;
    font-family: 'Inter Tight', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--silver);
    padding-top: 16px;
    margin-top: auto;
  }
  .footer .red { color: var(--calvary-red); }

  /* ====== DRAWER ====== */
  .drawer {
    position: fixed;
    inset: 0;
    background: rgba(11,11,14,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  .drawer.open { display: flex; }
  .drawer-card {
    background: var(--obsidian-elev);
    border: 1px solid var(--line);
    border-bottom: none;
    border-radius: 28px 28px 0 0;
    width: 100%;
    max-width: 540px;
    padding: 28px 24px max(env(safe-area-inset-bottom), 28px);
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .drawer-eyebrow {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--calvary-red);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .drawer-eyebrow::before {
    content: '';
    width: 24px;
    height: 1px;
    background: var(--calvary-red);
  }
  .drawer h2 {
    font-family: 'Anton', Impact, sans-serif;
    font-weight: 400;
    font-size: 42px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 14px;
  }
  .drawer .sub {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--warm-beige);
    font-size: 16px;
    line-height: 1.5;
    margin-bottom: 26px;
  }
  .drawer .field-label {
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--silver);
    margin-bottom: 12px;
  }
  .key-picker {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 22px;
  }
  .key-pick {
    background: var(--obsidian-card);
    border: 1px solid var(--line);
    color: var(--cream);
    font-family: 'Anton', Impact, sans-serif;
    font-weight: 400;
    font-size: 22px;
    padding: 14px 4px 12px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: -0.01em;
  }
  .key-pick:hover {
    border-color: var(--warm-beige);
    color: var(--cream);
  }
  .key-pick.selected {
    background: var(--calvary-red);
    border-color: var(--calvary-red);
    color: var(--cream);
  }
  .key-pick .acc {
    color: var(--calvary-red);
  }
  .key-pick.selected .acc {
    color: var(--cream);
  }

  .drawer-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .drawer-actions button {
    flex: 1;
    padding: 16px;
    border-radius: 100px;
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
  }
  .btn-secondary {
    background: none;
    border-color: var(--line-strong);
    color: var(--warm-beige);
  }
  .btn-secondary:hover {
    border-color: var(--warm-beige);
    color: var(--cream);
  }
  .btn-primary {
    background: var(--calvary-red);
    border-color: var(--calvary-red);
    color: var(--cream);
  }
  .btn-primary:hover {
    background: #E04A1F;
  }

  /* ====== TOAST ====== */
  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--obsidian-elev);
    border: 1px solid var(--line-strong);
    color: var(--cream);
    padding: 14px 22px;
    border-radius: 100px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 15px;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ====== KEY CHANGE ANIMATION ====== */
  @keyframes keypulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .key-letter.changed, .key-accidental.changed {
    animation: keypulse 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @media (min-width: 640px) {
    body { max-width: 580px; margin: 0 auto; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">Keyfinder</div>
  <button id="settingsBtn" class="home-btn" aria-label="Settings">
    Home <span class="home-key" id="homeKeyLabel">—</span>
  </button>
</header>

<main class="hero">
  <div class="eyebrow">You're in</div>

  <div class="keybox" id="keybox">
    <span class="key-letter" id="keyLetter">E</span><span class="key-accidental" id="keyAcc">♭</span>
  </div>

  <div class="key-mode" id="keyMode">major</div>

  <div class="delta">
    <span><b id="deltaSemi">0</b> SEMITONES</span>
    <span class="sep"></span>
    <span id="deltaInterval">unison</span>
  </div>

  <div class="transpose">
    <button class="tbtn" id="downBtn" aria-label="Transpose down">
      <span class="glyph">−</span>
      <span class="word">Down</span>
    </button>
    <button class="tbtn" id="upBtn" aria-label="Transpose up">
      <span class="glyph">+</span>
      <span class="word">Up</span>
    </button>
  </div>

  <div class="mode-toggle">
    <button id="majBtn" class="active">major</button>
    <button id="minBtn">minor</button>
  </div>

  <button class="reset-btn" id="resetBtn">↻ Reset to home</button>
</main>

<section class="panel">
  <div class="panel-title">Also Known As</div>
  <div class="relative-row">
    <span class="k">Relative <span id="relName">minor</span></span>
    <span class="v" id="relativeKey">C minor</span>
  </div>
  <div class="relative-row">
    <span class="k">Enharmonic</span>
    <span class="v" id="enharmKey">—</span>
  </div>
</section>

<footer class="footer">Built for <span class="red">Calvary Hephzibah</span></footer>

<!-- Settings / First-Run Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-card">
    <div class="drawer-eyebrow" id="drawerEyebrow">Setup</div>
    <h2 id="drawerTitle">Your home key</h2>
    <p class="sub" id="drawerSub">The key you naturally play in. Everything is calculated from here.</p>
    <div class="field-label">Choose home</div>
    <div class="key-picker" id="keyPicker"></div>
    <div class="drawer-actions">
      <button class="btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const SHARP_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const FLAT_NAMES  = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

  const INTERVAL_NAMES = [
    'unison',
    'minor 2nd', 'major 2nd',
    'minor 3rd', 'major 3rd',
    'perfect 4th',
    'tritone',
    'perfect 5th',
    'minor 6th', 'major 6th',
    'minor 7th', 'major 7th'
  ];

  const HOME_OPTIONS = ['C','D♭','D','E♭','E','F','G♭','G','A♭','A','B♭','B'];

  const NAME_TO_PC = {
    'C':0,'B#':0,
    'C#':1,'D♭':1,'Db':1,
    'D':2,
    'D#':3,'E♭':3,'Eb':3,
    'E':4,'F♭':4,
    'F':5,'E#':5,
    'F#':6,'G♭':6,'Gb':6,
    'G':7,
    'G#':8,'A♭':8,'Ab':8,
    'A':9,
    'A#':10,'B♭':10,'Bb':10,
    'B':11,'C♭':11
  };

  const PC_FLAT_PREF = {
    0: false, 1: true, 2: false, 3: true, 4: false, 5: true,
    6: true,  7: false, 8: true, 9: false, 10: true, 11: false
  };
  function pcPrefersFlats(pc) { return PC_FLAT_PREF[pc] === true; }

  const KEY_SPELLINGS = {
    'C':   ['C',  'D',  'E',  'F',  'G',  'A',  'B'],
    'G':   ['G',  'A',  'B',  'C',  'D',  'E',  'F#'],
    'D':   ['D',  'E',  'F#', 'G',  'A',  'B',  'C#'],
    'A':   ['A',  'B',  'C#', 'D',  'E',  'F#', 'G#'],
    'E':   ['E',  'F#', 'G#', 'A',  'B',  'C#', 'D#'],
    'B':   ['B',  'C#', 'D#', 'E',  'F#', 'G#', 'A#'],
    'F#':  ['F#', 'G#', 'A#', 'B',  'C#', 'D#', 'E#'],
    'F':   ['F',  'G',  'A',  'B♭', 'C',  'D',  'E'],
    'B♭':  ['B♭', 'C',  'D',  'E♭', 'F',  'G',  'A'],
    'E♭':  ['E♭', 'F',  'G',  'A♭', 'B♭', 'C',  'D'],
    'A♭':  ['A♭', 'B♭', 'C',  'D♭', 'E♭', 'F',  'G'],
    'D♭':  ['D♭', 'E♭', 'F',  'G♭', 'A♭', 'B♭', 'C'],
    'G♭':  ['G♭', 'A♭', 'B♭', 'C♭', 'D♭', 'E♭', 'F']
  };

  function canonicalKeyNameForPc(pc) {
    const useFlats = pcPrefersFlats(pc);
    let name = useFlats ? FLAT_NAMES[pc] : SHARP_NAMES[pc];
    if (!KEY_SPELLINGS[name]) {
      const alt = useFlats ? SHARP_NAMES[pc] : FLAT_NAMES[pc];
      if (KEY_SPELLINGS[alt]) name = alt;
    }
    return name;
  }

  // ====== STATE ======
  const STATE_KEY = 'keyfinder_state_v1';
  const savedState = loadState();
  const isFirstRun = !savedState;
  const state = savedState || {
    homeKey: 'C',
    transpose: 0,
    mode: 'major'
  };

  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }
  function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
  }

  // ====== HELPERS ======
  function pcOf(name) { return NAME_TO_PC[name] ?? 0; }
  function currentPc() { return (pcOf(state.homeKey) + state.transpose + 144) % 12; }

  function splitKey(name) {
    if (name.length === 1) return { letter: name, acc: '' };
    return { letter: name[0], acc: name.slice(1) };
  }

  function prettyAcc(acc) {
    if (acc === '#') return '♯';
    if (acc === 'b') return '♭';
    return acc;
  }

  function enharmonicOf(name) {
    const pc = pcOf(name);
    const sharp = SHARP_NAMES[pc];
    const flat = FLAT_NAMES[pc];
    if (sharp === flat) return null;
    return (name === sharp) ? flat : sharp;
  }

  function relativeOf(rootPc, mode) {
    if (mode === 'major') return (rootPc + 9) % 12;
    return (rootPc + 3) % 12;
  }

  function deltaDisplay(t) {
    const abs = Math.abs(t);
    const interval = INTERVAL_NAMES[abs % 12];
    const octaves = Math.floor(abs / 12);
    let label = interval;
    if (octaves > 0) label = octaves + ' oct + ' + interval;
    if (abs === 0) label = 'unison';
    return { semi: (t > 0 ? '+' : '') + t, interval: label };
  }

  // ====== RENDER ======
  function render(animate) {
    const pc = currentPc();
    const keyName = canonicalKeyNameForPc(pc);
    const { letter, acc } = splitKey(keyName);

    const elL = document.getElementById('keyLetter');
    const elA = document.getElementById('keyAcc');
    const prevText = elL.textContent + elA.textContent;
    elL.textContent = letter;
    elA.textContent = prettyAcc(acc);
    elA.style.display = acc ? '' : 'none';

    if (animate && (elL.textContent + elA.textContent) !== prevText) {
      elL.classList.remove('changed');
      elA.classList.remove('changed');
      void elL.offsetWidth;
      elL.classList.add('changed');
      elA.classList.add('changed');
    }

    document.getElementById('keyMode').textContent = state.mode;
    document.getElementById('homeKeyLabel').textContent = state.homeKey;

    const d = deltaDisplay(state.transpose);
    document.getElementById('deltaSemi').textContent = d.semi;
    document.getElementById('deltaInterval').textContent = d.interval;

    document.getElementById('majBtn').classList.toggle('active', state.mode === 'major');
    document.getElementById('minBtn').classList.toggle('active', state.mode === 'minor');

    document.getElementById('resetBtn').disabled = (state.transpose === 0);

    const relPc = relativeOf(pc, state.mode);
    const relMode = state.mode === 'major' ? 'minor' : 'major';
    const relKeyName = canonicalKeyNameForPc(relPc);
    document.getElementById('relName').textContent = relMode;
    document.getElementById('relativeKey').innerHTML = formatChord(relKeyName) + ' ' + relMode;

    const enh = enharmonicOf(keyName);
    document.getElementById('enharmKey').innerHTML = enh
      ? formatChord(enh) + ' ' + state.mode
      : '<span style="color:var(--silver); font-style:italic; font-family:\'Instrument Serif\',serif;">none</span>';
  }

  function formatChord(name) {
    const { letter, acc } = splitKey(name);
    if (!acc) return letter;
    return letter + '<span class="acc">' + prettyAcc(acc) + '</span>';
  }

  // ====== ACTIONS ======
  function transposeBy(n) {
    state.transpose += n;
    if (state.transpose > 12) state.transpose = 12;
    if (state.transpose < -12) state.transpose = -12;
    saveState();
    render(true);
  }

  function reset() {
    state.transpose = 0;
    saveState();
    render(true);
    toast('Reset to ' + state.homeKey);
  }

  function setMode(m) {
    state.mode = m;
    saveState();
    render(false);
  }

  function setHome(k) {
    state.homeKey = k;
    state.transpose = 0;
    saveState();
    render(true);
    toast('Home set to ' + k);
  }

  // ====== DRAWER ======
  function openDrawer(firstRun) {
    renderPicker();
    const eyebrow = document.getElementById('drawerEyebrow');
    const title = document.getElementById('drawerTitle');
    const sub = document.getElementById('drawerSub');
    const cancel = document.getElementById('cancelBtn');
    const save = document.getElementById('saveBtn');
    if (firstRun) {
      eyebrow.textContent = 'Welcome';
      title.textContent = 'Pick your home key';
      sub.textContent = "The key you play in most. Every transposition is calculated from here. You can change it any time.";
      cancel.style.display = 'none';
      save.textContent = 'Get started';
    } else {
      eyebrow.textContent = 'Settings';
      title.textContent = 'Your home key';
      sub.textContent = "The key you naturally play in. Everything is calculated from here.";
      cancel.style.display = '';
      save.textContent = 'Save';
    }
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer').dataset.firstRun = firstRun ? '1' : '';
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
  }
  function renderPicker() {
    const picker = document.getElementById('keyPicker');
    picker.innerHTML = '';
    HOME_OPTIONS.forEach(k => {
      const b = document.createElement('button');
      b.className = 'key-pick' + (k === state.homeKey && !isFirstRun ? ' selected' : '');
      b.innerHTML = formatChord(k);
      b.addEventListener('click', () => {
        document.querySelectorAll('.key-pick').forEach(x => x.classList.remove('selected'));
        b.classList.add('selected');
        picker._choice = k;
      });
      b.dataset.choice = k;
      picker.appendChild(b);
    });
    picker._choice = isFirstRun ? null : state.homeKey;
  }

  // ====== TOAST ======
  let toastTimer = null;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // ====== EVENTS ======
  document.getElementById('upBtn').addEventListener('click', () => transposeBy(1));
  document.getElementById('downBtn').addEventListener('click', () => transposeBy(-1));
  document.getElementById('resetBtn').addEventListener('click', reset);
  document.getElementById('majBtn').addEventListener('click', () => setMode('major'));
  document.getElementById('minBtn').addEventListener('click', () => setMode('minor'));
  document.getElementById('settingsBtn').addEventListener('click', () => openDrawer(false));
  document.getElementById('cancelBtn').addEventListener('click', closeDrawer);
  document.getElementById('saveBtn').addEventListener('click', () => {
    const picker = document.getElementById('keyPicker');
    if (picker._choice) {
      setHome(picker._choice);
      closeDrawer();
    } else if (!document.getElementById('drawer').dataset.firstRun) {
      closeDrawer();
    }
  });

  document.getElementById('drawer').addEventListener('click', (e) => {
    if (e.target.id === 'drawer') {
      if (document.getElementById('drawer').dataset.firstRun) return;
      closeDrawer();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('drawer').classList.contains('open')) {
      if (e.key === 'Escape' && !document.getElementById('drawer').dataset.firstRun) closeDrawer();
      return;
    }
    if (e.key === 'ArrowUp' || e.key === '+' || e.key === '=') { e.preventDefault(); transposeBy(1); }
    else if (e.key === 'ArrowDown' || e.key === '-') { e.preventDefault(); transposeBy(-1); }
    else if (e.key === '0') { e.preventDefault(); reset(); }
    else if (e.key.toLowerCase() === 'm') setMode(state.mode === 'major' ? 'minor' : 'major');
  });

  render(false);

  if (isFirstRun) {
    openDrawer(true);
  }
})();
</script>

</body>
</html>
