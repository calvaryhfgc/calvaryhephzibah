<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calvary Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Halo glow stack — layered shadows from tight to soft for legibility on any backdrop */
    --halo:
      0 0 4px rgba(0, 0, 0, 0.95),
      0 0 8px rgba(0, 0, 0, 0.85),
      0 0 18px rgba(0, 0, 0, 0.7),
      0 4px 28px rgba(0, 0, 0, 0.55);
    /* Legacy alias (kept for the lower third banner) */
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.85), 0 0 2px rgba(0, 0, 0, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: transparent;
    font-family: 'Inter', -apple-system, sans-serif;
    color: white;
    overflow: hidden;
    font-smooth: always;
    -webkit-font-smoothing: antialiased;
  }

  /* ===========================================================
     CANVAS — fixed 1920x1080 reference frame.
     Scaled visually with transform:scale() to fit any viewport
     so OBS, preview iframe, fullscreen all show identical layout.
     =========================================================== */
  #canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 1920px;
    height: 1080px;
    transform-origin: top left;
    /* JS sets transform: scale(N) on resize */
  }
  /* Live status indicator (dev only — hidden with ?hud=off) */
  .hud {
    position: fixed;
    top: 12px;
    right: 12px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(0, 0, 0, 0.6);
    color: rgba(255, 255, 255, 0.75);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: opacity 0.3s;
    z-index: 100;
  }
  .hud.off { display: none; }
  .hud .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #888;
    margin-right: 6px;
    vertical-align: middle;
  }
  .hud.connected .dot { background: #22c55e; }
  .hud.error .dot { background: #ef4444; }

  /* Stage — positioning controlled by CSS variables set via JS */
  :root {
    --stage-anchor: bottom;
    --stage-offset: 86px;          /* fixed within 1920x1080 canvas */
    --lyric-scale: 1;
    --verse-scale: 1;
  }
  .stage {
    position: absolute;
    left: 0;
    right: 0;
    padding: 0 80px;               /* fixed gutter, ~6% of 1920 */
    text-align: center;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease, bottom 0.3s ease, top 0.3s ease;
    pointer-events: none;
  }
  /* Bottom anchor */
  .stage[data-anchor="bottom"] {
    bottom: calc(var(--stage-offset) + var(--lt-pad, 0px));
    top: auto;
    transform: translateY(20px);
  }
  .stage[data-anchor="bottom"].active {
    transform: translateY(0);
    opacity: 1;
  }
  /* Top anchor */
  .stage[data-anchor="top"] {
    top: var(--stage-offset);
    bottom: auto;
    transform: translateY(-20px);
  }
  .stage[data-anchor="top"].active {
    transform: translateY(0);
    opacity: 1;
  }
  /* Middle anchor */
  .stage[data-anchor="middle"] {
    top: 50%;
    bottom: auto;
    transform: translateY(calc(-50% + 20px));
  }
  .stage[data-anchor="middle"].active {
    transform: translateY(-50%);
    opacity: 1;
  }
  /* Anchor-less stages (graphic, announcement) — full-screen, just fade in */
  .stage.active {
    opacity: 1;
  }

  /* LYRIC MODE — two lines in a centred band (lower-third style, but middle-aligned) */
  .lyric-line {
    font-weight: 700;
    font-size: calc(64px * var(--lyric-scale));
    line-height: 1.2;
    letter-spacing: -0.02em;
    text-shadow: var(--halo);
    -webkit-text-stroke: 2px rgba(0, 0, 0, 0.85);
    paint-order: stroke fill;
    margin: 0 auto;
    width: 60%;                    /* 60% of 1920 = 1152px band */
    max-width: 1100px;
  }
  .lyric-line + .lyric-line {
    margin-top: 0.15em;
  }

  /* VERSE MODE — slightly smaller than lyrics, scripture-friendly */
  .verse-text {
    font-family: 'Inter', serif;
    font-weight: 600;
    font-size: calc(54px * var(--verse-scale));
    line-height: 1.35;
    letter-spacing: -0.015em;
    text-shadow: var(--halo);
    -webkit-text-stroke: 2px rgba(0, 0, 0, 0.85);
    paint-order: stroke fill;
    width: 65%;
    max-width: 1200px;
    margin: 0 auto 28px;
  }
  .verse-text .vnum {
    display: inline-block;
    font-size: 0.5em;
    font-weight: 600;
    color: rgba(196, 30, 42, 0.95);
    margin-right: 0.35em;
    vertical-align: 0.45em;
    -webkit-text-stroke: 1px rgba(0, 0, 0, 0.6);
    text-shadow:
      0 0 4px rgba(0, 0, 0, 0.95),
      0 0 8px rgba(0, 0, 0, 0.7);
  }
  .verse-text .vnum + * { margin-left: 0; }
  .verse-ref {
    font-weight: 500;
    font-size: calc(28px * var(--verse-scale));
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #C41E2A;
    text-shadow:
      0 0 4px rgba(0, 0, 0, 1),
      0 0 10px rgba(0, 0, 0, 0.8),
      0 2px 12px rgba(0, 0, 0, 0.7);
    -webkit-text-stroke: 1px rgba(0, 0, 0, 0.6);
    paint-order: stroke fill;
  }

  /* GRAPHIC MODE — full-bleed image OR silent looping video */
  .graphic-stage {
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .graphic-stage img,
  .graphic-stage video {
    width: 100%;
    height: 100%;
    object-fit: cover;             /* fill the canvas, crop if aspect doesn't match */
  }
  .graphic-stage img.hidden,
  .graphic-stage video.hidden { display: none; }

  /* ANNOUNCEMENT MODE — templated text card with Calvary branding */
  .announcement-stage {
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .announcement-card {
    width: 1100px;
    max-width: 70%;
    padding: 80px 100px;
    background: linear-gradient(135deg, rgba(196, 30, 42, 0.95) 0%, rgba(150, 22, 32, 0.95) 100%);
    border-radius: 24px;
    border-left: 6px solid rgba(255, 255, 255, 0.92);
    box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
    text-align: center;
    color: white;
  }
  .announcement-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
    margin-bottom: 18px;
  }
  .announcement-title {
    font-family: 'Instrument Serif', 'Playfair Display', serif;
    font-weight: 400;
    font-size: 88px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  }
  .announcement-body {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 38px;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.95);
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
  }
  .announcement-body:empty {
    display: none;
  }
  .announcement-card.kind-birthday {
    background: linear-gradient(135deg, #c41e2a 0%, #9c1822 60%, #6b1018 100%);
  }
  .announcement-card.kind-anniversary {
    background: linear-gradient(135deg, #b8336a 0%, #8b2752 60%, #5a1837 100%);
  }
  .announcement-card.kind-midweek {
    background: linear-gradient(135deg, #2d4a8c 0%, #1e3470 60%, #122247 100%);
  }
  .announcement-card.kind-special {
    background: linear-gradient(135deg, #c41e2a 0%, #9c1822 60%, #6b1018 100%);
  }

  /* ============ LOWER THIRD ============ */
  .lower-third {
    position: absolute;
    left: 60px;
    bottom: calc(var(--lt-bottom, 50px));
    background: linear-gradient(135deg, rgba(196, 30, 42, 0.95) 0%, rgba(150, 22, 32, 0.95) 100%);
    padding: 18px 28px 18px 22px;
    border-radius: 0 8px 8px 0;
    border-left: 5px solid rgba(255, 255, 255, 0.9);
    min-width: 320px;
    max-width: 800px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
    opacity: 0;
    transform: translateX(-20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }
  .lower-third.active {
    opacity: 1;
    transform: translateX(0);
  }
  .lt-name {
    font-weight: 700;
    font-size: 36px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
  }
  .lt-role {
    font-weight: 500;
    font-size: 22px;
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.2;
    letter-spacing: 0.5px;
  }
  .lt-role:empty {
    display: none;
  }

  /* ============ LOGO BUG ============ */
  .logo-bug {
    position: absolute;
    width: var(--logo-size, 80px);
    height: var(--logo-size, 80px);
    opacity: var(--logo-opacity, 0.8);
    transition: opacity 0.4s ease, top 0.4s ease, left 0.4s ease, right 0.4s ease, bottom 0.4s ease;
    pointer-events: none;
    display: none;
  }
  .logo-bug img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
  }
  .logo-bug[data-corner="tl"] { display: block; top: 40px;    left: 60px;    right: auto; bottom: auto; }
  .logo-bug[data-corner="tr"] { display: block; top: 40px;    right: 60px;   left: auto;  bottom: auto; }
  .logo-bug[data-corner="bl"] { display: block; bottom: 40px; left: 60px;    right: auto; top: auto; }
  .logo-bug[data-corner="br"] { display: block; bottom: 40px; right: 60px;   left: auto;  top: auto; }
</style>
</head>
<body>

<div id="hud" class="hud"><span class="dot"></span><span id="hud-text">connecting…</span></div>

<div id="canvas">

<!-- Logo bug — set via display settings, persists across modes -->
<div id="logo-bug" class="logo-bug" data-corner="off">
  <img src="logo-bug.png" alt="" onerror="this.style.display='none'">
</div>

<!-- Lower third — independent of lyric/verse stages, can coexist -->
<div id="lower-third-stage" class="lower-third">
  <div class="lt-inner">
    <div id="lt-name" class="lt-name"></div>
    <div id="lt-role" class="lt-role"></div>
  </div>
</div>

<div id="lyric-stage" class="stage" data-anchor="bottom">
  <div id="lyric-line1" class="lyric-line"></div>
  <div id="lyric-line2" class="lyric-line"></div>
</div>

<div id="verse-stage" class="stage" data-anchor="bottom">
  <div id="verse-text" class="verse-text"></div>
  <div id="verse-ref" class="verse-ref"></div>
</div>

<div id="graphic-stage" class="stage graphic-stage">
  <img id="graphic-img" src="" alt="">
  <video id="graphic-video" class="hidden" autoplay loop muted playsinline></video>
</div>

<div id="announcement-stage" class="stage announcement-stage">
  <div id="announcement-card" class="announcement-card">
    <div id="announcement-eyebrow" class="announcement-eyebrow"></div>
    <div id="announcement-title" class="announcement-title"></div>
    <div id="announcement-body" class="announcement-body"></div>
  </div>
</div>

</div><!-- /canvas -->

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ============================================================
// CANVAS FIT — scale fixed 1920x1080 canvas to viewport, letterboxed
// Ensures identical layout whether running fullscreen in OBS or
// inside a tiny preview iframe. All internal pixel sizes stay literal.
// ============================================================
(function fitCanvas() {
  const canvas = document.getElementById('canvas');
  if (!canvas) return;
  function fit() {
    // document.documentElement.clientWidth/Height is more reliable than
    // window.innerWidth/Height inside iframes, especially during load
    const w = document.documentElement.clientWidth  || window.innerWidth;
    const h = document.documentElement.clientHeight || window.innerHeight;
    if (w === 0 || h === 0) return;            // not laid out yet, skip
    const sx = w / 1920;
    const sy = h / 1080;
    const s  = Math.min(sx, sy);
    const offsetX = (w - 1920 * s) / 2;
    const offsetY = (h - 1080 * s) / 2;
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${s})`;
  }
  fit();
  window.addEventListener('resize', fit);
  // ResizeObserver catches iframe resizes that 'resize' event misses
  if (window.ResizeObserver) {
    new ResizeObserver(fit).observe(document.documentElement);
  }
  // Belt-and-braces: re-run a couple of times during early load,
  // since iframe geometry can shift after the parent finishes layout
  setTimeout(fit, 50);
  setTimeout(fit, 250);
  setTimeout(fit, 1000);
})();

// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://pfycvgbrsbecznkcikwt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmeWN2Z2Jyc2JlY3pua2Npa3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzY1NDgsImV4cCI6MjA5MDk1MjU0OH0.xw_DSmC0brKC7K9H-rxNG0HKKDi4I-dNSEoZKERvHcQ';  // from Supabase dashboard → Project Settings → API

const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  realtime: { params: { eventsPerSecond: 10 } }
});

// ============================================================
// HUD (status indicator — hidden with ?hud=off in OBS)
// ============================================================
const hud = document.getElementById('hud');
const hudText = document.getElementById('hud-text');
const params = new URLSearchParams(location.search);
if (params.get('hud') === 'off') hud.classList.add('off');

function setStatus(state, label) {
  hud.classList.remove('connected', 'error');
  if (state) hud.classList.add(state);
  hudText.textContent = label;
}

// ============================================================
// STAGES
// ============================================================
const stages = {
  lyric:        document.getElementById('lyric-stage'),
  verse:        document.getElementById('verse-stage'),
  graphic:      document.getElementById('graphic-stage'),
  announcement: document.getElementById('announcement-stage'),
};

function hideAll() {
  Object.values(stages).forEach(s => s.classList.remove('active'));
}

function escapeHtmlForOverlay(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(mode, payload) {
  hideAll();

  if (mode === 'blank' || !mode) return;

  if (mode === 'lyric') {
    document.getElementById('lyric-line1').textContent = payload.line1 || '';
    document.getElementById('lyric-line2').textContent = payload.line2 || '';
    requestAnimationFrame(() => stages.lyric.classList.add('active'));
  } else if (mode === 'verse') {
    // If payload includes a `verses` array, render each verse with a small inline number marker.
    // Otherwise fall back to plain text (for back-compat with single-verse pushes).
    const versesEl = document.getElementById('verse-text');
    if (Array.isArray(payload.verses) && payload.verses.length) {
      versesEl.innerHTML = payload.verses.map(v =>
        `<span class="vnum">${v.n}</span>${escapeHtmlForOverlay(v.text)}`
      ).join(' ');
    } else {
      versesEl.textContent = payload.text || '';
    }
    document.getElementById('verse-ref').textContent =
      [payload.reference, payload.version].filter(Boolean).join(' · ');
    requestAnimationFrame(() => stages.verse.classList.add('active'));
  } else if (mode === 'graphic') {
    // Accepts payload.media_url (Storage URL — preferred), payload.data_url (legacy base64), or payload.image_url
    const src = payload.media_url || payload.data_url || payload.image_url;
    if (!src) return;
    const imgEl = document.getElementById('graphic-img');
    const videoEl = document.getElementById('graphic-video');
    const isVideo = (payload.media_type === 'video') || /^data:video\//i.test(src);
    if (isVideo) {
      imgEl.classList.add('hidden');
      videoEl.classList.remove('hidden');
      // Only reset if src actually changed — avoids restarting a looping video on every minor update
      if (videoEl.src !== src) {
        videoEl.src = src;
        videoEl.load();
      }
      videoEl.play().catch(() => {/* autoplay should work because muted */});
    } else {
      videoEl.classList.add('hidden');
      // Pause to free decoder when switching back to images
      try { videoEl.pause(); videoEl.removeAttribute('src'); videoEl.load(); } catch (_) {}
      imgEl.classList.remove('hidden');
      imgEl.src = src;
    }
    requestAnimationFrame(() => stages.graphic.classList.add('active'));
  } else if (mode === 'announcement') {
    const card = document.getElementById('announcement-card');
    // Reset kind classes
    card.className = 'announcement-card';
    if (payload.kind) card.classList.add('kind-' + payload.kind);
    document.getElementById('announcement-eyebrow').textContent = payload.eyebrow || '';
    document.getElementById('announcement-title').textContent   = payload.title   || '';
    document.getElementById('announcement-body').textContent    = payload.body    || '';
    requestAnimationFrame(() => stages.announcement.classList.add('active'));
  }
}

// ============================================================
// DISPLAY SETTINGS (position, size)
// ============================================================
const SIZE_SCALE = { small: 0.8, medium: 1.0, large: 1.25 };

function applyDisplaySettings(settings) {
  const anchor = settings.position || 'bottom';
  // Default offset is now 14 (matches a comfortable lower-third position).
  // 14 * 10.8 = 151px from canvas edge — sits lyrics in lower third without crowding edge.
  const offset = typeof settings.vertical_offset === 'number' ? settings.vertical_offset : 14;
  const scale = SIZE_SCALE[settings.size] || 1.0;

  // Convert offset to pixels against the 1080 canvas height
  const offsetPx = Math.round(offset * 10.8);
  document.documentElement.style.setProperty('--stage-offset', offsetPx + 'px');
  document.documentElement.style.setProperty('--lyric-scale', scale);
  document.documentElement.style.setProperty('--verse-scale', scale);

  // Update anchor on both stages
  document.getElementById('lyric-stage').dataset.anchor = anchor;
  document.getElementById('verse-stage').dataset.anchor = anchor;

  // Logo bug
  const corner = settings.logo_corner || 'off';
  const logoOpacity = (typeof settings.logo_opacity === 'number' ? settings.logo_opacity : 80) / 100;
  const logoSize = (typeof settings.logo_size === 'number' ? settings.logo_size : 80);
  const logoEl = document.getElementById('logo-bug');
  logoEl.dataset.corner = corner;
  logoEl.style.setProperty('--logo-opacity', logoOpacity);
  logoEl.style.setProperty('--logo-size', logoSize + 'px');
}

async function fetchDisplaySettings() {
  const { data, error } = await client
    .from('control_room_display')
    .select('position, vertical_offset, size, logo_corner, logo_opacity, logo_size')
    .eq('id', 1)
    .single();
  if (error) { console.error('display settings fetch:', error); return; }
  applyDisplaySettings(data);
}

function subscribeDisplaySettings() {
  client.channel('control-room-display')
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'control_room_display', filter: 'id=eq.1' },
      ({ new: row }) => applyDisplaySettings(row))
    .subscribe();
}

// ============================================================
// LOWER THIRD (independent of mode)
// ============================================================
function renderLowerThird(lt) {
  const stage = document.getElementById('lower-third-stage');
  // Treat null, undefined, missing name all as "clear"
  const hasLT = lt && typeof lt === 'object' && lt.name && String(lt.name).trim();
  if (!hasLT) {
    stage.classList.remove('active');
    // Clear the text too so any stale content doesn't flash if .active is re-added
    document.getElementById('lt-name').textContent = '';
    document.getElementById('lt-role').textContent = '';
    document.documentElement.style.setProperty('--lt-pad', '0');
    return;
  }
  document.getElementById('lt-name').textContent = lt.name;
  document.getElementById('lt-role').textContent = lt.role || '';
  stage.classList.add('active');
  // Reserve ~150px at the bottom so bottom-anchored lyrics don't collide
  document.documentElement.style.setProperty('--lt-pad', '150px');
}

// ============================================================
// INITIAL FETCH + REALTIME SUBSCRIPTION
// ============================================================
async function fetchCurrent() {
  const { data, error } = await client
    .from('control_room_live')
    .select('mode, payload, lower_third')
    .eq('id', 1)
    .single();

  if (error) {
    setStatus('error', 'fetch failed: ' + (error.message || error.code || 'unknown').toString().slice(0, 40));
    console.error('fetchCurrent error:', error);
    return;
  }
  render(data.mode, data.payload);
  renderLowerThird(data.lower_third);
  setStatus('connected', 'live');
}

function subscribe() {
  const channel = client
    .channel('control-room-live')
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'control_room_live', filter: 'id=eq.1' },
      ({ new: row }) => {
        render(row.mode, row.payload);
        renderLowerThird(row.lower_third);
      })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') setStatus('connected', 'live');
      else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        setStatus('error', 'reconnecting…');
        setTimeout(() => { client.removeChannel(channel); subscribe(); }, 2000);
      }
    });
}

// ============================================================
// BOOT
// ============================================================
fetchDisplaySettings();
subscribeDisplaySettings();
fetchCurrent();
subscribe();

// Re-sync every 30s as a safety net (realtime should handle this,
// but if the connection silently dies OBS won't notice)
setInterval(fetchCurrent, 30000);
</script>

</body>
</html>
