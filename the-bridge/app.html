<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Bridge — Calvary Hephzibah</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
:root{
  --red:#C41E2A; --red-light:#FEF2F2;
  --green:#16A34A; --green-light:#F0FDF4;
  --amber:#D97706; --amber-light:#FFFBEB;
  --ink:#0F172A; --ink-2:#334155; --ink-3:#64748B; --ink-4:#94A3B8; --ink-5:#E2E8F0;
  --white:#fff; --bg:#F1F5F9;
  --r8:8px; --r12:12px; --r16:16px;
  --shadow:0 4px 24px rgba(15,23,42,0.10);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.screen.active{display:flex;}

/* ── CARD ── */
.card{background:var(--white);border-radius:var(--r16);padding:36px 32px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center;}
.card-logo{width:48px;height:48px;background:var(--red);border-radius:var(--r12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.card-logo svg{width:22px;height:22px;}
.card-title{font-family:'Instrument Serif',serif;font-size:26px;color:var(--ink);margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--ink-4);margin-bottom:28px;line-height:1.55;}
.card-msg{font-size:13px;min-height:18px;margin-bottom:12px;}
.card-msg.err{color:var(--red);}
.card-msg.ok{color:var(--green);}

/* ── PIN PAD ── */
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--ink-5);transition:all 0.15s;}
.pin-dot.on{background:var(--red);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pkey{padding:17px;border:1.5px solid var(--ink-5);background:var(--white);border-radius:var(--r12);font-size:22px;font-weight:400;font-family:'DM Sans',sans-serif;color:var(--ink);cursor:pointer;transition:all 0.1s;-webkit-tap-highlight-color:transparent;user-select:none;}
.pkey:active{background:var(--bg);transform:scale(0.95);}
.pkey.del{font-size:16px;color:var(--ink-4);}

/* ── USER SELECT ── */
.user-list{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;max-height:320px;overflow-y:auto;}
.user-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg);border:1.5px solid transparent;border-radius:var(--r12);cursor:pointer;text-align:left;transition:all 0.12s;width:100%;}
.user-btn:hover{border-color:var(--ink-5);background:var(--white);}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.user-info-name{font-size:14px;font-weight:600;color:var(--ink);}
.user-info-role{font-size:11px;color:var(--ink-4);margin-top:1px;}
.level-badge{margin-left:auto;font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;flex-shrink:0;}
.lb-cos{background:#F3E8FF;color:#7C3AED;}
.lb-func{background:var(--blue-light,#EFF6FF);color:#2563EB;}

/* ── APP ── */
#app{display:none;position:fixed;inset:0;}
#app iframe{width:100%;height:100%;border:none;}

/* ── USER CHIP ── */
#user-chip{position:fixed;top:12px;right:12px;z-index:100;display:none;}
.chip{display:flex;align-items:center;gap:7px;background:var(--white);border:1px solid var(--ink-5);border-radius:100px;padding:5px 12px 5px 7px;cursor:pointer;box-shadow:0 1px 4px rgba(15,23,42,0.08);}
.chip-av{width:22px;height:22px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;}
.chip-name{font-size:12px;font-weight:500;color:var(--ink-2);}
.chip-menu{position:absolute;top:36px;right:0;background:var(--white);border:1px solid var(--ink-5);border-radius:var(--r12);padding:6px;min-width:160px;box-shadow:var(--shadow);display:none;}
.chip-menu.open{display:block;}
.chip-mi{padding:8px 12px;border-radius:8px;font-size:13px;color:var(--ink-2);cursor:pointer;display:flex;align-items:center;gap:8px;}
.chip-mi:hover{background:var(--bg);}
.chip-mi.red{color:var(--red);}

/* ── ADMIN ── */
.admin-bg{position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.admin-bg.open{display:flex;}
.admin-panel{background:var(--white);border-radius:var(--r16) var(--r16) 0 0;width:100%;max-width:680px;max-height:88vh;overflow-y:auto;padding:28px 28px 48px;}
.admin-h{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);margin-bottom:2px;}
.admin-sub{font-size:13px;color:var(--ink-4);margin-bottom:24px;}
.asec{margin-bottom:28px;}
.asec-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-4);margin-bottom:10px;}
.urow{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg);border-radius:var(--r12);margin-bottom:7px;}
.urow-av{width:34px;height:34px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;flex-shrink:0;}
.urow-info{flex:1;min-width:0;}
.urow-name{font-size:13px;font-weight:600;color:var(--ink);}
.urow-meta{font-size:11px;color:var(--ink-4);margin-top:1px;}
.urow-acts{display:flex;gap:5px;flex-shrink:0;}
.xbtn{padding:5px 9px;border-radius:6px;font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border:1.5px solid var(--ink-5);background:var(--white);color:var(--ink-3);transition:all 0.12s;}
.xbtn:hover{background:var(--bg);}
.xbtn.danger{border-color:#FECACA;background:var(--red-light);color:var(--red);}
.new-form{background:var(--bg);border-radius:var(--r12);padding:16px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.frow{display:flex;flex-direction:column;gap:4px;}
.flabel{font-size:11px;font-weight:600;color:var(--ink-3);}
.finput{background:var(--white);border:1.5px solid var(--ink-5);border-radius:var(--r8);padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;transition:border-color 0.12s;}
.finput:focus{border-color:var(--red);}
.fselect{background:var(--white);border:1.5px solid var(--ink-5);border-radius:var(--r8);padding:8px 11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;cursor:pointer;}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-top:8px;}
.stog{padding:7px 8px;border-radius:var(--r8);border:1.5px solid var(--ink-5);background:var(--white);font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--ink-3);cursor:pointer;text-align:center;transition:all 0.12s;}
.stog.on{border-color:var(--red);background:var(--red-light);color:var(--red);}
.abtn{width:100%;background:var(--red);color:white;border:none;border-radius:var(--r8);padding:11px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;margin-top:4px;}
.abtn:hover{opacity:0.9;}
.amsg{font-size:13px;text-align:center;margin-top:8px;min-height:18px;}
.amsg.ok{color:var(--green);}
.amsg.err{color:var(--red);}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--ink);color:white;padding:10px 20px;border-radius:var(--r8);font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .card{padding:28px 20px;}
  .fgrid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- SCREEN: WHO ARE YOU -->
<div class="screen active" id="s-who">
  <div class="card">
    <div class="card-logo">
      <svg viewBox="0 0 16 16" fill="none"><rect x="6.5" y="1" width="3" height="14" rx="0.5" fill="white"/><rect x="1" y="5.5" width="14" height="3" rx="0.5" fill="white"/></svg>
    </div>
    <div class="card-title">The Bridge</div>
    <div class="card-sub">Calvary Hephzibah · Select your name to continue</div>
    <div class="user-list" id="user-list">
      <div style="font-size:13px;color:var(--ink-4);padding:16px 0;">Loading…</div>
    </div>
    <div class="card-msg err" id="who-msg"></div>
  </div>
</div>

<!-- SCREEN: PIN -->
<div class="screen" id="s-pin">
  <div class="card">
    <div class="card-logo">
      <svg viewBox="0 0 16 16" fill="none"><rect x="6.5" y="1" width="3" height="14" rx="0.5" fill="white"/><rect x="1" y="5.5" width="14" height="3" rx="0.5" fill="white"/></svg>
    </div>
    <div class="card-title" id="pin-title">Enter your PIN</div>
    <div class="card-sub" id="pin-sub">Enter your 4-digit PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pkey" onclick="pk('1')">1</button>
      <button class="pkey" onclick="pk('2')">2</button>
      <button class="pkey" onclick="pk('3')">3</button>
      <button class="pkey" onclick="pk('4')">4</button>
      <button class="pkey" onclick="pk('5')">5</button>
      <button class="pkey" onclick="pk('6')">6</button>
      <button class="pkey" onclick="pk('7')">7</button>
      <button class="pkey" onclick="pk('8')">8</button>
      <button class="pkey" onclick="pk('9')">9</button>
      <button class="pkey" style="visibility:hidden"></button>
      <button class="pkey" onclick="pk('0')">0</button>
      <button class="pkey del" onclick="pdel()">⌫</button>
    </div>
    <div class="card-msg err" id="pin-msg" style="margin-top:12px;"></div>
    <div style="margin-top:16px;">
      <button onclick="goWho()" style="background:none;border:none;font-size:12px;color:var(--ink-4);cursor:pointer;">← Back</button>
    </div>
  </div>
</div>

<!-- USER CHIP -->
<div id="user-chip">
  <div class="chip" onclick="toggleChipMenu()">
    <div class="chip-av" id="chip-av">?</div>
    <span class="chip-name" id="chip-name"></span>
  </div>
  <div class="chip-menu" id="chip-menu">
    <div style="padding:8px 12px 10px;border-bottom:1px solid var(--ink-5);margin-bottom:4px;">
      <div style="font-size:13px;font-weight:600;color:var(--ink);" id="menu-name"></div>
      <div style="font-size:11px;color:var(--ink-4);margin-top:2px;" id="menu-level"></div>
    </div>
    <div class="chip-mi" id="admin-mi" onclick="openAdmin()" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="5" r="2.5"/><path d="M2 12c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="11" cy="4" r="1.5" fill="currentColor" stroke="none"/><line x1="11" y1="2" x2="11" y2="6" stroke="currentColor" stroke-width="1.2"/></svg>
      Manage users
    </div>
    <div class="chip-mi red" onclick="signOut()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 2h3v10H9M6 10l3-3-3-3M9 7H1"/></svg>
      Switch user
    </div>
  </div>
</div>

<!-- APP FRAME -->
<div id="app">
  <iframe id="frame" src=""></iframe>
</div>

<!-- ADMIN PANEL -->
<div class="admin-bg" id="admin-bg" onclick="adminBgClick(event)">
  <div class="admin-panel" id="admin-panel">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="admin-h">Manage users</div>
        <div class="admin-sub">Create users, set PINs, assign levels and sections.</div>
      </div>
      <button onclick="closeAdmin()" style="background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;color:var(--ink-3);">×</button>
    </div>

    <div class="asec">
      <div class="asec-title">Current users</div>
      <div id="admin-list"></div>
    </div>

    <div class="asec">
      <div class="asec-title">Add / edit user</div>
      <div class="new-form">
        <input type="hidden" id="edit-id">
        <div class="fgrid">
          <div class="frow">
            <label class="flabel">Name</label>
            <input class="finput" id="f-name" placeholder="e.g. Pastor Shade Olatoye">
          </div>
          <div class="frow">
            <label class="flabel">Email (optional)</label>
            <input class="finput" id="f-email" placeholder="e.g. shade@calvary.co.uk" type="email">
          </div>
          <div class="frow">
            <label class="flabel">PIN (4 digits)</label>
            <input class="finput" id="f-pin" placeholder="e.g. 1234" maxlength="4" type="text" inputmode="numeric">
          </div>
          <div class="frow">
            <label class="flabel">Level</label>
            <select class="fselect" id="f-level" onchange="levelChanged()">
              <option value="cos">CoS — full access</option>
              <option value="functional" selected>Functional — assigned sections</option>
            </select>
          </div>
        </div>
        <div id="sec-row">
          <div class="flabel" style="margin-bottom:6px;">Sections this user can see</div>
          <div class="sec-grid" id="sec-grid"></div>
        </div>
        <button class="abtn" onclick="saveUser()">Save user</button>
        <button onclick="clearForm()" style="background:none;border:none;font-size:12px;color:var(--ink-4);cursor:pointer;display:block;margin:8px auto 0;">Clear form</button>
        <div class="amsg" id="admin-msg"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://pfycvgbrsbecznkcikwt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmeWN2Z2Jyc2JlY3pua2Npa3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNzY1NDgsImV4cCI6MjA5MDk1MjU0OH0.xw_DSmC0brKC7K9H-rxNG0HKKDi4I-dNSEoZKERvHcQ';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

const ALL_SECTIONS = [
  {id:'priorities', label:'Priorities'},
  {id:'actions',    label:'Actions'},
  {id:'overview',   label:'Ministries'},
  {id:'finance',    label:'Finance'},
  {id:'vision',     label:'Vision'},
  {id:'protocols',  label:'Protocols'},
  {id:'media',      label:'Media team'},
  {id:'worship',    label:'Worship'},
  {id:'pastoral',   label:'Pastoral'},
  {id:'cos',        label:'Chief of Staff'},
  {id:'notes',      label:'Notes'},
];

let users = [];
let currentUser = null;
let pinEntry = '';
let selectedSections = new Set();

// ── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  // Check for saved session
  const saved = sessionStorage.getItem('bridge_user');
  if (saved) {
    try {
      currentUser = JSON.parse(saved);
      launch();
      return;
    } catch(e) { sessionStorage.removeItem('bridge_user'); }
  }
  await loadUsers();
  showScreen('s-who');
}

async function loadUsers() {
  const { data, error } = await db
    .from('bridge_users_v2')
    .select('id,name,level,sections,active')
    .eq('active', true)
    .order('name');
  if (!error && data) users = data;
  renderUserList();
}

function renderUserList() {
  const el = document.getElementById('user-list');
  if (!users.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--ink-4);padding:12px 0;">No users set up yet.<br>Contact Bolaji to add you.</div>';
    return;
  }
  el.innerHTML = users.map(u => `
    <button class="user-btn" onclick="selectUser(${u.id})">
      <div class="user-avatar">${initials(u.name)}</div>
      <div style="text-align:left;">
        <div class="user-info-name">${u.name}</div>
        <div class="user-info-role">${u.level === 'cos' ? 'Chief of Staff' : 'Team member'}</div>
      </div>
      <span class="level-badge ${u.level === 'cos' ? 'lb-cos' : 'lb-func'}">${u.level === 'cos' ? 'CoS' : 'Functional'}</span>
    </button>`).join('');
}

// ── USER SELECT ──────────────────────────────────────────────────────────────
function selectUser(id) {
  const u = users.find(x => x.id === id);
  if (!u) return;
  currentUser = u;
  pinEntry = '';
  updateDots();
  document.getElementById('pin-title').textContent = `Hello, ${u.name.split(' ')[0]}`;
  document.getElementById('pin-sub').textContent = 'Enter your 4-digit PIN to continue';
  document.getElementById('pin-msg').textContent = '';
  showScreen('s-pin');
}

function goWho() {
  currentUser = null;
  pinEntry = '';
  updateDots();
  showScreen('s-who');
}

// ── PIN ──────────────────────────────────────────────────────────────────────
function pk(d) {
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updateDots();
  if (pinEntry.length === 4) {
    setTimeout(checkPin, 150);
  }
}

function pdel() {
  pinEntry = pinEntry.slice(0,-1);
  updateDots();
  document.getElementById('pin-msg').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d'+i).classList.toggle('on', i < pinEntry.length);
  }
}

async function checkPin() {
  // Fetch the full user record including pin_hash
  const { data, error } = await db
    .from('bridge_users_v2')
    .select('*')
    .eq('id', currentUser.id)
    .single();

  if (error || !data) {
    showPinError('Could not verify PIN. Try again.');
    return;
  }

  if (hashPin(pinEntry) !== data.pin_hash) {
    showPinError('Incorrect PIN. Try again.');
    return;
  }

  currentUser = data;
  sessionStorage.setItem('bridge_user', JSON.stringify(data));
  launch();
}

function showPinError(msg) {
  document.getElementById('pin-msg').textContent = msg;
  pinEntry = '';
  updateDots();
  // Shake dots
  const dots = document.querySelector('.pin-dots');
  dots.style.animation = 'none';
  setTimeout(() => { dots.style.animation = ''; }, 10);
}

// ── LAUNCH ───────────────────────────────────────────────────────────────────
function launch() {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');

  // User chip
  const chip = document.getElementById('user-chip');
  chip.style.display = 'block';
  document.getElementById('chip-av').textContent = initials(currentUser.name);
  document.getElementById('chip-name').textContent = currentUser.name.split(' ')[0];
  document.getElementById('menu-name').textContent = currentUser.name;
  document.getElementById('menu-level').textContent = currentUser.level === 'cos' ? 'Chief of Staff — full access' : 'Functional access';

  if (currentUser.level === 'cos') {
    document.getElementById('admin-mi').style.display = 'flex';
  }

  // Build sections
  const sections = currentUser.level === 'cos'
    ? ALL_SECTIONS.map(s => s.id)
    : (currentUser.sections || []);

  const params = new URLSearchParams({
    user: currentUser.name,
    level: currentUser.level,
    sections: sections.join(','),
  });

  document.getElementById('frame').src = `index.html?${params}`;
  document.getElementById('app').style.display = 'block';
  showToast(`Welcome, ${currentUser.name.split(' ')[0]}`);
}

function signOut() {
  sessionStorage.removeItem('bridge_user');
  currentUser = null;
  pinEntry = ''; updateDots();
  document.getElementById('app').style.display = 'none';
  document.getElementById('user-chip').style.display = 'none';
  document.getElementById('frame').src = '';
  document.getElementById('admin-mi').style.display = 'none';
  document.querySelectorAll('.screen').forEach(s => s.style.display = '');
  loadUsers();
  showScreen('s-who');
  toggleChipMenu(true);
}

// ── CHIP MENU ────────────────────────────────────────────────────────────────
function toggleChipMenu(forceClose) {
  const m = document.getElementById('chip-menu');
  if (forceClose) { m.classList.remove('open'); return; }
  m.classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#user-chip')) toggleChipMenu(true);
});

// ── ADMIN ────────────────────────────────────────────────────────────────────
function openAdmin() {
  toggleChipMenu(true);
  buildSecGrid();
  loadAdminList();
  document.getElementById('admin-bg').classList.add('open');
}
function closeAdmin() {
  document.getElementById('admin-bg').classList.remove('open');
  clearForm();
}
function adminBgClick(e) {
  if (e.target === document.getElementById('admin-bg')) closeAdmin();
}

function buildSecGrid() {
  document.getElementById('sec-grid').innerHTML = ALL_SECTIONS.map(s =>
    `<div class="stog" id="st-${s.id}" onclick="toggleSec('${s.id}')">${s.label}</div>`
  ).join('');
}

function toggleSec(id) {
  if (selectedSections.has(id)) selectedSections.delete(id);
  else selectedSections.add(id);
  document.getElementById('st-'+id).classList.toggle('on', selectedSections.has(id));
}

function levelChanged() {
  const isFunc = document.getElementById('f-level').value === 'functional';
  document.getElementById('sec-row').style.display = isFunc ? 'block' : 'none';
  if (document.getElementById('f-level').value === 'cos') {
    selectedSections = new Set(ALL_SECTIONS.map(s => s.id));
    document.querySelectorAll('.stog').forEach(el => el.classList.add('on'));
  }
}

async function loadAdminList() {
  const { data } = await db.from('bridge_users_v2').select('*').order('name');
  const el = document.getElementById('admin-list');
  if (!data?.length) { el.innerHTML = '<div style="font-size:13px;color:var(--ink-4);">No users yet.</div>'; return; }
  el.innerHTML = data.map(u => `
    <div class="urow">
      <div class="urow-av">${initials(u.name)}</div>
      <div class="urow-info">
        <div class="urow-name">${u.name} <span class="level-badge ${u.level==='cos'?'lb-cos':'lb-func'}" style="margin-left:4px;">${u.level==='cos'?'CoS':'Functional'}</span></div>
        <div class="urow-meta">PIN: ${u.pin_hash ? 'set' : 'not set'} · ${u.active ? 'Active' : 'Suspended'} · ${u.email || 'no email'} · Sections: ${u.level==='cos'?'All':(u.sections||[]).join(', ')||'none'}</div>
      </div>
      <div class="urow-acts">
        <button class="xbtn" onclick="editUser(${u.id})">Edit</button>
        <button class="xbtn danger" onclick="toggleActive(${u.id},${u.active})">${u.active?'Suspend':'Restore'}</button>
      </div>
    </div>`).join('');
}

async function editUser(id) {
  const { data } = await db.from('bridge_users_v2').select('*').eq('id', id).single();
  if (!data) return;
  document.getElementById('edit-id').value = data.id;
  document.getElementById('f-name').value = data.name;
  document.getElementById('f-email').value = data.email || '';
  document.getElementById('f-pin').value = '';
  document.getElementById('f-level').value = data.level;
  levelChanged();
  selectedSections = new Set(data.sections || []);
  document.querySelectorAll('.stog').forEach(el => {
    const sid = el.id.replace('st-','');
    el.classList.toggle('on', selectedSections.has(sid));
  });
  document.getElementById('sec-row').style.display = data.level === 'functional' ? 'block' : 'none';
  document.getElementById('admin-msg').textContent = '';
}

async function saveUser() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const pin = document.getElementById('f-pin').value.trim();
  const level = document.getElementById('f-level').value;
  const editId = document.getElementById('edit-id').value;
  const msg = document.getElementById('admin-msg');

  if (!name) { msg.textContent = 'Name is required.'; msg.className = 'amsg err'; return; }

  const sections = level === 'cos'
    ? ALL_SECTIONS.map(s => s.id)
    : [...selectedSections];

  const payload = { name, email: email || null, level, sections, active: true };
  if (pin) {
    if (!/^\d{4}$/.test(pin)) { msg.textContent = 'PIN must be exactly 4 digits.'; msg.className = 'amsg err'; return; }
    payload.pin_hash = hashPin(pin);
  }

  let error;
  if (editId) {
    ({ error } = await db.from('bridge_users_v2').update(payload).eq('id', editId));
  } else {
    if (!pin) { msg.textContent = 'PIN is required for new users.'; msg.className = 'amsg err'; return; }
    ({ error } = await db.from('bridge_users_v2').insert([payload]));
  }

  if (error) {
    msg.textContent = 'Error saving: ' + error.message;
    msg.className = 'amsg err';
  } else {
    msg.textContent = editId ? 'User updated.' : `User "${name}" created.`;
    msg.className = 'amsg ok';
    clearForm();
    loadAdminList();
    loadUsers();
  }
}

async function toggleActive(id, current) {
  await db.from('bridge_users_v2').update({ active: !current }).eq('id', id);
  loadAdminList();
  loadUsers();
  showToast(current ? 'User suspended' : 'User restored');
}

function clearForm() {
  document.getElementById('edit-id').value = '';
  document.getElementById('f-name').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-pin').value = '';
  document.getElementById('f-level').value = 'functional';
  selectedSections = new Set();
  document.querySelectorAll('.stog').forEach(el => el.classList.remove('on'));
  document.getElementById('sec-row').style.display = 'block';
  document.getElementById('admin-msg').textContent = '';
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function initials(name) {
  return (name||'?').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
}

function hashPin(pin) {
  let h = 5381;
  for (let i = 0; i < pin.length; i++) h = ((h << 5) + h) ^ pin.charCodeAt(i);
  return 'bp_' + (h >>> 0).toString(36);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Keyboard support for PIN screen
document.addEventListener('keydown', e => {
  const pinActive = document.getElementById('s-pin').classList.contains('active');
  if (!pinActive) return;
  if (e.key >= '0' && e.key <= '9') pk(e.key);
  if (e.key === 'Backspace') pdel();
});

init();
</script>
