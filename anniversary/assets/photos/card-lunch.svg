<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Warm candlelight backdrop - deep amber/coral fading to dark -->
    <radialGradient id="bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#FFC894" stop-opacity="1"/>
      <stop offset="35%" stop-color="#E8814A" stop-opacity="1"/>
      <stop offset="75%" stop-color="#7A2A0F" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1F0805" stop-opacity="1"/>
    </radialGradient>
    <!-- Candle flame glow points -->
    <radialGradient id="flame1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEBC0" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFB060" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flame2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE8B0" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#E08040" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft bokeh layer -->
    <filter id="softBlur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="bigBlur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>
  
  <!-- Base warm gradient -->
  <rect width="1600" height="600" fill="url(#bg)"/>
  
  <!-- Suggestion of a long table - a warm horizontal band of light -->
  <rect x="0" y="380" width="1600" height="160" fill="#3A1408" opacity="0.55" filter="url(#bigBlur)"/>
  
  <!-- Suggested candle flames - small bright glows along the "table" -->
  <ellipse cx="240" cy="380" rx="60" ry="40" fill="url(#flame1)" filter="url(#softBlur)"/>
  <ellipse cx="540" cy="370" rx="80" ry="50" fill="url(#flame1)" filter="url(#softBlur)"/>
  <ellipse cx="900" cy="385" rx="70" ry="45" fill="url(#flame2)" filter="url(#softBlur)"/>
  <ellipse cx="1240" cy="375" rx="65" ry="42" fill="url(#flame1)" filter="url(#softBlur)"/>
  <ellipse cx="1450" cy="385" rx="55" ry="38" fill="url(#flame2)" filter="url(#softBlur)"/>
  
  <!-- Bokeh highlights in upper portion (chandelier suggestion) -->
  <circle cx="180" cy="120" r="8" fill="#FFE4B5" opacity="0.6" filter="url(#softBlur)"/>
  <circle cx="380" cy="80" r="10" fill="#FFE4B5" opacity="0.5" filter="url(#softBlur)"/>
  <circle cx="720" cy="100" r="7" fill="#FFE4B5" opacity="0.6" filter="url(#softBlur)"/>
  <circle cx="1080" cy="90" r="9" fill="#FFE4B5" opacity="0.55" filter="url(#softBlur)"/>
  <circle cx="1380" cy="110" r="8" fill="#FFE4B5" opacity="0.5" filter="url(#softBlur)"/>
  
  <!-- Subtle vignette to add depth -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1600" height="600" fill="url(#vignette)"/>
</svg>
