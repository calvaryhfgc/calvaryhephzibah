<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="spot" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#D0441C" stop-opacity="0.28"></stop>
      <stop offset="55%" stop-color="#0B0B0E" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="warm" cx="20%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#9A2F11" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#0B0B0E" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"></feTurbulence>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.90  0 0 0 0.07 0"></feColorMatrix>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#0B0B0E"></rect>
  <rect width="1600" height="900" fill="url(#spot)"></rect>
  <rect width="1600" height="900" fill="url(#warm)"></rect>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.5"></rect>
</svg>