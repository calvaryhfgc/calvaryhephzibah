<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #0B0B0E; padding: 28px; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 110px; height: 110px; border-radius: 4px; border: 1px solid rgba(244,239,230,0.06); }
  .name { font-family: 'Inter Tight', sans-serif; font-size: 12px; color: #F4EFE6; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex  { font-family: ui-monospace, 'SF Mono', monospace; font-size: 11px; color: #A29C90; }
  .label { font-family: 'Inter Tight', sans-serif; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 14px; font-weight: 600; }
</style></head>
<body>
  <div class="label">Brand · Calvary Red</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#D0441C"></div><div class="name">Red</div><div class="hex">#D0441C</div></div>
    <div class="swatch"><div class="chip" style="background:#E55A30"></div><div class="name">Red Bright</div><div class="hex">#E55A30</div></div>
    <div class="swatch"><div class="chip" style="background:#9A2F11"></div><div class="name">Red Deep</div><div class="hex">#9A2F11</div></div>
    <div class="swatch"><div class="chip" style="background:#6E1A0F"></div><div class="name">Ember</div><div class="hex">#6E1A0F</div></div>
    <div class="swatch"><div class="chip" style="background:#C8A24B"></div><div class="name">Gold (accent)</div><div class="hex">#C8A24B</div></div>
  </div>
</body></html>
