<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 32px; }
  .label { font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip-row { display: flex; gap: 14px; align-items: center; margin-top: 24px; }
</style></head>
<body>
  <div class="label">Pills &amp; Date Chips</div>
  <div class="row">
    <span class="cv-pill">Ministry</span>
    <span class="cv-pill cv-pill-gold">Vision Pillar</span>
    <span class="cv-pill cv-pill-ember">Critical · Deadline</span>
    <span class="cv-pill">Worship</span>
    <span class="cv-pill cv-pill-gold">Anointed</span>
  </div>
  <div class="chip-row">
    <span class="cv-date-chip"><span class="dow">Sun</span><span class="num">26</span></span>
    <span class="cv-date-chip"><span class="dow">Wed</span><span class="num">29</span></span>
    <span class="cv-date-chip"><span class="dow">Sun</span><span class="num">11</span></span>
  </div>
</body></html>
