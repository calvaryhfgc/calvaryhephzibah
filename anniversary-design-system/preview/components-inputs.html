<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 32px; }
  .label { font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 18px; }
  .stack { display: grid; gap: 22px; max-width: 540px; }
  label { display: block; font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 6px; font-weight: 600; }
</style></head>
<body>
  <div class="label">Form Inputs</div>
  <div class="stack">
    <div><label>Full Name</label><input class="cv-input" placeholder="Pastor Gbenga Adebanjo"></div>
    <div><label>Ministry</label><input class="cv-input" placeholder="Worship · Production · Hospitality"></div>
    <div><label>Confirmation</label><input class="cv-input" placeholder="Locked. Final. Sunday 26."></div>
  </div>
</body></html>
