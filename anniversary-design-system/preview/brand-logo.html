<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 28px; display: flex; gap: 40px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .name { font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600; }
  .lockup-dark, .lockup-light { padding: 16px 24px; border: 1px solid rgba(244,239,230,0.08); border-radius: 4px; }
  .lockup-light { background: #F4EFE6; border-color: rgba(20,20,26,0.08); }
  img { display: block; }
</style></head>
<body>
  <div class="col">
    <div class="name">Wordmark · Dark</div>
    <div class="lockup-dark"><img src="../assets/logo-wordmark-dark.svg" width="320" alt=""></div>
  </div>
  <div class="col">
    <div class="name">Wordmark · Light</div>
    <div class="lockup-light"><img src="../assets/logo-wordmark-light.svg" width="320" alt=""></div>
  </div>
  <div class="col">
    <div class="name">Mark</div>
    <div class="lockup-dark"><img src="../assets/logo-mark.svg" width="120" alt=""></div>
  </div>
</body></html>
