<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 36px; }
  .label { font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 24px; }
  .row { display: flex; gap: 36px; align-items: flex-end; }
  .demo { width: 130px; height: 130px; background: #1C1C22; border-radius: 4px; }
  .e1 { box-shadow: 0 2px 12px rgba(0,0,0,0.35); }
  .e2 { box-shadow: 0 24px 64px rgba(0,0,0,0.55); }
  .glow { box-shadow: inset 0 0 60px rgba(200,162,75,0.18); border: 1px solid rgba(200,162,75,0.4); }
  .name { font-family: 'Inter Tight'; font-size: 11px; color: #F4EFE6; font-weight: 600; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .px { font-family: ui-monospace; font-size: 10px; color: #A29C90; max-width: 130px; }
  .col { display: flex; flex-direction: column; }
</style></head>
<body>
  <div class="label">Elevation</div>
  <div class="row">
    <div class="col"><div class="demo e1"></div><div class="name">shadow-1</div><div class="px">0 2 12 / .35 — cards</div></div>
    <div class="col"><div class="demo e2"></div><div class="name">shadow-2</div><div class="px">0 24 64 / .55 — heroes</div></div>
    <div class="col"><div class="demo glow"></div><div class="name">inner glow gold</div><div class="px">inset · premium banner</div></div>
  </div>
</body></html>
