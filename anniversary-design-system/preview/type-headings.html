<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 28px; }
  .label { font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 18px; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px solid rgba(244,239,230,0.06); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: ui-monospace; font-size: 10px; color: #A29C90; min-width: 120px; }
  .h1 { font-family: 'Anton'; font-size: 56px; line-height: 1; letter-spacing: -0.03em; text-transform: uppercase; color: #F4EFE6; }
  .h2 { font-family: 'Anton'; font-size: 40px; line-height: 1; letter-spacing: -0.03em; text-transform: uppercase; color: #F4EFE6; }
  .h3 { font-family: 'Instrument Serif'; font-style: italic; font-size: 28px; color: #F4EFE6; }
  .eyebrow { font-family: 'Inter Tight'; font-size: 12px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600; }
</style></head>
<body>
  <div class="label">Heading Scale</div>
  <div class="row"><div class="meta">eyebrow / 12</div><span class="eyebrow">Our Vision</span></div>
  <div class="row"><div class="meta">h1 / 56–88</div><div class="h1">More Than Celebration</div></div>
  <div class="row"><div class="meta">h2 / 40–64</div><div class="h2">Critical Path</div></div>
  <div class="row"><div class="meta">h3 / 28 italic</div><div class="h3">Powerful Proclamation</div></div>
</body></html>
