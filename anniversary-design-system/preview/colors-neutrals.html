<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 28px; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 110px; height: 110px; border-radius: 4px; border: 1px solid rgba(244,239,230,0.10); }
  .name { font-family: 'Inter Tight', sans-serif; font-size: 12px; color: #F4EFE6; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .hex  { font-family: ui-monospace, 'SF Mono', monospace; font-size: 11px; color: #A29C90; }
  .label { font-family: 'Inter Tight', sans-serif; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 14px; }
</style></head>
<body>
  <div class="label">Surfaces &amp; Neutrals</div>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#0B0B0E"></div><div class="name">Obsidian</div><div class="hex">#0B0B0E</div></div>
    <div class="swatch"><div class="chip" style="background:#1C1C22"></div><div class="name">Slate</div><div class="hex">#1C1C22</div></div>
    <div class="swatch"><div class="chip" style="background:#2A2A33"></div><div class="name">Graphite</div><div class="hex">#2A2A33</div></div>
    <div class="swatch"><div class="chip" style="background:#A29C90"></div><div class="name">Ash</div><div class="hex">#A29C90</div></div>
    <div class="swatch"><div class="chip" style="background:#F4EFE6"></div><div class="name">Bone</div><div class="hex">#F4EFE6</div></div>
    <div class="swatch"><div class="chip" style="background:#FBF8F2"></div><div class="name">Paper</div><div class="hex">#FBF8F2</div></div>
  </div>
</body></html>
