<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 0; }
  .frame { position: relative; width: 100%; height: 280px; overflow: hidden; }
  .frame img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .label { position: absolute; left: 28px; top: 24px; font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; z-index: 2; }
  .hero { position: absolute; left: 28px; bottom: 28px; right: 28px; font-family: 'Anton'; font-size: 96px; line-height: 0.85; letter-spacing: -0.04em; text-transform: uppercase; color: #F4EFE6; z-index: 2; }
  .stack { display: grid; gap: 0; }
</style></head>
<body>
  <div class="stack">
    <div class="frame">
      <img src="../assets/bg-stage.svg" alt="">
      <div class="label">Background · Stage Spotlight</div>
      <div class="hero">THANKFUL</div>
    </div>
  </div>
</body></html>
