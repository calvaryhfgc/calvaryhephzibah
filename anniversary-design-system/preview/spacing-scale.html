<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;}
  body { background: #0B0B0E; padding: 28px; }
  .label { font-family: 'Inter Tight'; font-size: 11px; color: #D0441C; text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 14px; }
  .row { display: flex; align-items: center; gap: 16px; padding: 10px 0; }
  .name { font-family: 'Inter Tight'; font-size: 11px; color: #F4EFE6; min-width: 60px; font-weight: 600; }
  .px   { font-family: ui-monospace; font-size: 10px; color: #A29C90; min-width: 56px; }
  .bar  { background: #D0441C; height: 14px; border-radius: 2px; }
</style></head>
<body>
  <div class="label">Spacing Scale · 8px base</div>
  <div class="row"><div class="name">s-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="name">s-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="name">s-3</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="name">s-4</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="name">s-5</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="name">s-6</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="name">s-7</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="name">s-8</div><div class="px">96px</div><div class="bar" style="width:96px"></div></div>
  <div class="row"><div class="name">s-9</div><div class="px">128px</div><div class="bar" style="width:128px"></div></div>
</body></html>
