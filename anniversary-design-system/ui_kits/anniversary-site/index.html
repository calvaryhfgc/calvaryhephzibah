<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>THANKFUL 2026 — Calvary Anniversary</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #0B0B0E; color: #F4EFE6; }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: -1;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.90  0 0 0 0.05 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.5; mix-blend-mode: overlay;
  }
  @media (max-width: 900px) {
    nav { padding: 16px 24px !important; }
    nav > div:last-child > a:not(.cv-btn) { display: none !important; }
    section { padding-left: 24px !important; padding-right: 24px !important; }
    footer { padding: 56px 24px 40px !important; }
    footer > div:first-child { grid-template-columns: 1fr !important; gap: 40px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="VisionSection.jsx"></script>
<script type="text/babel" src="TimelineSection.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <div data-screen-label="Anniversary Microsite">
      <Nav/>
      <Hero/>
      <VisionSection/>
      <TimelineSection/>
      <CTASection/>
      <Footer/>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

// Re-render lucide once everything mounts
setTimeout(() => { if (window.lucide) window.lucide.createIcons({ attrs: { 'stroke-width': '1.5' } }); }, 400);
</script>
</body>
</html>
